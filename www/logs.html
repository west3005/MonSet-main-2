<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MonSet — Logs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root {
    --bg:#0d0f12; --surface:#141720; --surface2:#1a1e2a;
    --border:oklch(from #e0c97a 0.7 0.1 85 / 0.15);
    --text:#e8e6e0; --muted:#8a8880; --faint:#4a4846;
    --gold:#c8963c; --gold-h:#e0b060;
    --green:#4a9460; --yellow:#b89030; --red:#9c4040;
    --green-bg:oklch(from #4a9460 0.25 0.08 145 / 0.25);
    --yellow-bg:oklch(from #b89030 0.3 0.1 85 / 0.25);
    --red-bg:oklch(from #9c4040 0.25 0.1 25 / 0.25);
    --radius:6px; --radius-lg:10px;
    --mono:'Geist Mono','Courier New',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:14px;-webkit-font-smoothing:antialiased}
  body{background:var(--bg);color:var(--text);font-family:'Inter','Helvetica Neue',sans-serif;min-height:100dvh;display:flex;flex-direction:column}
  a{color:var(--gold);text-decoration:none} a:hover{color:var(--gold-h)}
  button{cursor:pointer;border:none;font:inherit}
  nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:0;height:52px;position:sticky;top:0;z-index:100}
  .nav-logo{display:flex;align-items:center;gap:10px;margin-right:32px;color:var(--gold);font-weight:700;font-size:15px;letter-spacing:.03em}
  nav a{color:var(--muted);font-size:13px;font-weight:500;padding:0 14px;height:52px;display:flex;align-items:center;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
  nav a:hover{color:var(--text)} nav a.active{color:var(--gold);border-bottom-color:var(--gold)}
  .nav-spacer{flex:1}
  .nav-status{font-size:11px;color:var(--faint);font-family:var(--mono)}
  main{flex:1;padding:24px;max-width:960px;margin:0 auto;width:100%}
  .page-title{font-size:20px;font-weight:600;color:var(--text);margin-bottom:20px;letter-spacing:-.01em}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
  .card+.card{margin-top:16px}
  .card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
  input[type=text],input[type=number],input[type=password],select,textarea{width:100%;padding:8px 11px;background:var(--bg);border:1px solid oklch(from var(--text) 0.5 0 0 / 0.15);border-radius:var(--radius);color:var(--text);font:inherit;font-family:var(--mono);font-size:12px;outline:none;transition:border-color .15s}
  input:focus,select:focus,textarea:focus{border-color:var(--gold)}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-row.three{grid-template-columns:1fr 1fr 1fr}
  .form-field{display:flex;flex-direction:column}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;transition:background .15s,color .15s,border-color .15s}
  .btn-primary{background:var(--gold);color:#0d0f12} .btn-primary:hover{background:var(--gold-h)}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)} .btn-ghost:hover{color:var(--text)}
  .btn-danger{background:var(--red-bg);color:#d06060;border:1px solid oklch(from #9c4040 0.5 0.1 25 / 0.3)} .btn-danger:hover{background:oklch(from #9c4040 0.3 0.1 25 / 0.35)}
  .btn-sm{padding:5px 10px;font-size:12px}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
  .badge-ok{background:var(--green-bg);color:#70c490} .badge-warn{background:var(--yellow-bg);color:#d0a840} .badge-err{background:var(--red-bg);color:#d07070}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 20px;border-radius:var(--radius-lg);font-size:13px;font-weight:500;transition:transform .25s cubic-bezier(.16,1,.3,1),opacity .25s;opacity:0;pointer-events:none;z-index:9999;white-space:nowrap}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  #toast.ok{background:var(--green-bg);color:#70c490;border:1px solid oklch(from #4a9460 0.4 0.08 145 / 0.4)}
  #toast.warn{background:var(--yellow-bg);color:#d0a840;border:1px solid oklch(from #b89030 0.4 0.1 85 / 0.4)}
  #toast.err{background:var(--red-bg);color:#d07070;border:1px solid oklch(from #9c4040 0.4 0.1 25 / 0.4)}
  .acc-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:14px 20px;margin:-20px -20px 0;border-radius:var(--radius-lg) var(--radius-lg) 0 0;user-select:none;transition:background .15s}
  .acc-hdr:hover{background:oklch(from var(--text) 0.15 0 0 / 0.05)}
  .acc-hdr h2{font-size:13px;font-weight:600;color:var(--text)}
  .acc-arrow{color:var(--muted);transition:transform .2s;font-size:11px}
  .acc-arrow.open{transform:rotate(90deg)}
  .acc-body{margin-top:20px;display:none} .acc-body.open{display:block}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px}
  .kpi-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
  .kpi-value{font-size:24px;font-weight:700;font-family:var(--mono);color:var(--gold);letter-spacing:-.02em;line-height:1}
  .kpi-value.ok{color:#70c490} .kpi-value.warn{color:#d0a840} .kpi-value.err{color:#d07070}
  .kpi-unit{font-size:12px;color:var(--muted);margin-top:4px}
  #log-output{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-family:var(--mono);font-size:11.5px;line-height:1.6;height:480px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
  .log-info{color:#7898b8} .log-warn{color:#c8a840} .log-error{color:#c06060} .log-data{color:#60a878} .log-debug{color:#888}
  .file-table{width:100%;border-collapse:collapse}
  .file-table th{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
  .file-table td{padding:9px 12px;font-size:13px;border-bottom:1px solid var(--border)}
  .file-table tr:last-child td{border-bottom:none}
  .file-table tr:hover td{background:oklch(from var(--text) 0.15 0 0 / 0.04)}
  .file-icon{margin-right:6px;color:var(--gold)}
  .file-size{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .drop-zone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:32px;text-align:center;color:var(--muted);transition:border-color .15s,background .15s;cursor:pointer}
  .drop-zone.drag-over{border-color:var(--gold);background:var(--yellow-bg)}
  .progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px;display:none}
  .progress-fill{height:100%;background:var(--gold);width:0;transition:width .1s;border-radius:2px}
  @media(max-width:600px){main{padding:16px}.form-row,.form-row.three{grid-template-columns:1fr}.kpi-grid{grid-template-columns:1fr 1fr}}

.log-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
.log-toolbar select,.log-toolbar input{width:auto;min-width:80px}
#log-output{height:calc(100vh - 220px);min-height:320px}
.ll-all{color:var(--muted)} .ll-info{color:#7898b8} .ll-warn{color:#c8a840} .ll-error{color:#c06060} .ll-data{color:#60a878} .ll-debug{color:#888}
</style>
</head>
<body>
<nav>
<div class="nav-logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-label="MonSet"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><polyline points="7 10 10 7 13 10 16 7"/></svg>MonSet</div>
<a href="/">Dashboard</a><a href="/config">Config</a><a href="/logs" class="active">Logs</a><a href="/files">Files</a>
<div class="nav-spacer"></div>
<span class="nav-status" id="nav-ip">—</span>
</nav>
<main style="max-width:1200px">
  <h1 class="page-title">Logs</h1>
  <div class="log-toolbar">
    <label style="margin:0;white-space:nowrap">Уровень:</label>
    <select id="ll-filter" style="width:110px">
      <option value="">Все</option>
      <option value="ERR">ERROR</option>
      <option value="WRN">WARN</option>
      <option value="INF">INFO</option>
      <option value="DBG">DEBUG</option>
      <option value="DATA">DATA</option>
    </select>
    <label style="margin:0;white-space:nowrap">Строк:</label>
    <select id="ll-lines">
      <option value="100">100</option>
      <option value="250" selected>250</option>
      <option value="500">500</option>
      <option value="1000">1000</option>
    </select>
    <button class="btn btn-ghost btn-sm" id="btn-pause" onclick="togglePause()">⏸ Пауза</button>
    <button class="btn btn-ghost btn-sm" onclick="saveLog()">💾 Скачать</button>
    <button class="btn btn-ghost btn-sm" onclick="clearView()">✕ Очистить</button>
    <label id="autoscroll-lbl" style="margin:0;display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;color:var(--muted)">
      <input type="checkbox" id="cb-autoscroll" checked> авто-скролл
    </label>
    <span style="flex:1"></span>
    <span id="log-count" style="font-size:11px;color:var(--faint);font-family:var(--mono)"></span>
  </div>
  <div id="log-output" class="log-data"></div>
</main>
<div id="toast"></div>
<script>

function toast(msg,type,ms){
  type=type||'ok'; ms=ms||6000;
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='show '+type;
  clearTimeout(t._tid);
  t._tid=setTimeout(function(){t.className=type;},ms);
}

var paused=false;
var lastRaw=[];
function togglePause(){
  paused=!paused;
  document.getElementById('btn-pause').textContent=paused?'▶ Продолжить':'⏸ Пауза';
}
function colorLine(line){
  var t=line.toUpperCase();
  if(/\[ERR/.test(t)||/ERROR/.test(t)) return '<span class="log-error">'+escH(line)+'</span>';
  if(/\[WRN/.test(t)||/WARN/.test(t))  return '<span class="log-warn">'+escH(line)+'</span>';
  if(/\[DATA/.test(t))                 return '<span class="log-data">'+escH(line)+'</span>';
  if(/\[DBG/.test(t)||/DEBUG/.test(t)) return '<span class="log-debug">'+escH(line)+'</span>';
  return '<span class="log-info">'+escH(line)+'</span>';
}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function applyFilter(lines){
  var f=document.getElementById('ll-filter').value.toUpperCase();
  if(!f) return lines;
  return lines.filter(function(l){return l.toUpperCase().indexOf(f)>=0;});
}
function poll(){
  if(paused) return;
  var n=document.getElementById('ll-lines').value;
  fetch('/api/logs?n='+n+'&format=array').then(r=>r.json()).then(function(d){
    var lines=Array.isArray(d)?d:(d.lines||[]);
    lastRaw=lines;
    render(lines);
  }).catch(function(){});
}
function render(lines){
  var filtered=applyFilter(lines);
  var out=document.getElementById('log-output');
  out.innerHTML=filtered.map(colorLine).join('\n');
  document.getElementById('log-count').textContent=filtered.length+' строк';
  if(document.getElementById('cb-autoscroll').checked) out.scrollTop=out.scrollHeight;
}
function clearView(){ document.getElementById('log-output').innerHTML=''; lastRaw=[]; }
function saveLog(){
  var txt=(lastRaw||[]).join('\n');
  var b=new Blob([txt],{type:'text/plain'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download='monset_log_'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.txt';
  a.click();
}
document.getElementById('ll-filter').addEventListener('change',function(){render(lastRaw);});
poll(); setInterval(poll,3000);
</script>
</body>
</html>
