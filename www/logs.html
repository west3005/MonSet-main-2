<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0e1117;color:#c9d1d9;font:14px/1.5 system-ui,sans-serif;padding-bottom:70px}a{color:#2dd4bf;text-decoration:none}.nav{background:#161b22;border-bottom:1px solid #30363d;display:flex;gap:4px;padding:8px 12px}.nav a{padding:6px 14px;border-radius:6px;color:#c9d1d9;font-size:13px}.nav a.act{background:#2dd4bf;color:#0e1117;font-weight:600}.hdr{padding:14px 16px;border-bottom:1px solid #30363d;background:#161b22;font-size:18px;font-weight:700;color:#2dd4bf}details{background:#161b22;border:1px solid #30363d;border-radius:8px;margin:10px}summary{padding:10px 14px;cursor:pointer;font-weight:600;font-size:13px;color:#2dd4bf;user-select:none;list-style:none;display:flex;align-items:center;gap:6px}summary::before{content:"▶";font-size:10px;transition:transform .2s}details[open]>summary::before{transform:rotate(90deg)}.sc{padding:12px 14px 14px}.r{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;align-items:center}.f{display:flex;flex-direction:column;gap:3px;flex:1;min-width:120px}label{font-size:11px;color:#8b949e}input[type=text],input[type=number],input[type=password],select{background:#0e1117;border:1px solid #30363d;border-radius:5px;color:#c9d1d9;padding:5px 8px;font-size:13px;width:100%}input:focus,select:focus{outline:none;border-color:#2dd4bf}.tg{display:flex;align-items:center;gap:8px}.tg input[type=checkbox]{appearance:none;width:36px;height:20px;background:#30363d;border-radius:10px;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}.tg input[type=checkbox]:checked{background:#2dd4bf}.tg input[type=checkbox]::after{content:"";position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s}.tg input[type=checkbox]:checked::after{left:19px}.tg span{font-size:13px;white-space:nowrap}.btn{background:#2dd4bf;color:#0e1117;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:600}.btn:hover{opacity:.85}.btn.s{background:#30363d;color:#c9d1d9}.cd{background:#0e1117;border:1px solid #30363d;border-radius:6px;padding:10px;margin-bottom:8px}.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.tabs{display:flex;gap:4px;margin-bottom:10px}.tab{padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px;background:#0e1117;border:1px solid #30363d;color:#c9d1d9}.tab.act{background:#2dd4bf;color:#0e1117;border-color:#2dd4bf;font-weight:600}.tp{display:none}.tp.act{display:block}.bar{position:fixed;bottom:0;left:0;right:0;background:#161b22;border-top:1px solid #30363d;padding:10px 16px;display:flex;gap:8px;z-index:99}.dr{display:flex;align-items:center;gap:6px;background:#0e1117;border:1px solid #30363d;border-radius:5px;padding:5px 8px;margin-bottom:5px}.dr span{flex:1;font-size:12px}.dr button{background:none;border:none;color:#8b949e;cursor:pointer;font-size:14px;padding:0 2px}.dr button:hover{color:#2dd4bf}table{width:100%;border-collapse:collapse;font-size:12px}th{background:#0e1117;color:#8b949e;padding:5px 6px;text-align:left;border-bottom:1px solid #30363d}td{padding:4px 5px;border-bottom:1px solid #1c2128}td input,td select{padding:3px 5px;font-size:12px}.msg{display:none;padding:6px 12px;border-radius:5px;font-size:13px;font-weight:600}.ok{background:#1a3a2e;color:#2dd4bf}.er{background:#3a1a1a;color:#f87171}.warn{background:#2a2200;color:#e3b341}.sh{font-size:12px;color:#8b949e;margin:8px 0 4px;font-weight:600}

/* ── layout shell (sidebar + wrap) ─────────────────── */
body{padding:0;display:flex;flex-direction:row;min-height:100dvh}

.sidebar{
  width:52px;min-width:52px;
  background:#161b22;
  border-right:1px solid #30363d;
  display:flex;flex-direction:column;align-items:center;
  padding:10px 0;gap:2px;
  position:sticky;top:0;height:100dvh;
  flex-shrink:0;
}
.sidebar-logo{
  width:32px;height:32px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:center;
  color:#2dd4bf;
}
.sidebar a{
  width:38px;height:38px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:#8b949e;text-decoration:none;
  transition:color .15s,background .15s;
  position:relative;
}
.sidebar a:hover{color:#c9d1d9;background:#21262d}
.sidebar a.act{
  color:#0e1117;background:#2dd4bf;
}
.sidebar a.act::after{
  content:attr(title);
  position:absolute;left:48px;
  background:#161b22;color:#2dd4bf;
  font-size:11px;font-weight:600;
  padding:3px 8px;border-radius:4px;
  border:1px solid #30363d;
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .15s;
  z-index:100;
}
.sidebar a:hover::after{
  content:attr(title);
  position:absolute;left:48px;
  background:#161b22;color:#c9d1d9;
  font-size:11px;padding:3px 8px;border-radius:4px;
  border:1px solid #30363d;
  white-space:nowrap;pointer-events:none;
  opacity:1;z-index:100;
}
.sidebar-spacer{flex:1}
.sidebar-ver{
  font-size:10px;color:#484f58;
  writing-mode:vertical-rl;
  padding-bottom:6px;letter-spacing:.1em;
}

.wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* topbar — тонкая полоска с IP */
.topbar{
  background:#161b22;border-bottom:1px solid #30363d;
  height:40px;display:flex;align-items:center;
  padding:0 16px;gap:12px;flex-shrink:0;
}
.topbar-title{font-size:13px;font-weight:600;color:#2dd4bf;flex:1}
.topbar-ip{font-size:12px;color:#8b949e;font-family:monospace}

/* wrap > main */
.wrap main, .wrap > div:not(.topbar){padding:0}

/* ── доп. классы из index.html ──────────────────────── */
:root{--teal:#2dd4bf;--bg:#0e1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e}
.page-title{font-size:18px;font-weight:700;color:#2dd4bf;padding:14px 16px 0;margin-bottom:14px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin:10px}
.card+.card{margin-top:0}
.card-title{font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1c2128}
.stat-row:last-child{border-bottom:none}
.stat-key{font-size:12px;color:#8b949e}
.stat-val{font-size:12px;color:#c9d1d9;font-family:monospace;text-align:right}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin:10px}
.kpi{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px 16px}
.kpi-label{font-size:11px;color:#8b949e;font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:700;font-family:monospace;color:#c9d1d9}
.kpi-value.ok{color:#2dd4bf}.kpi-value.warn{color:#e3b341}.kpi-value.err{color:#f87171}
.kpi-unit{font-size:12px;color:#8b949e;margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.badge-ok{background:#1a3a2e;color:#2dd4bf}
.badge-warn{background:#2a2200;color:#e3b341}
.badge-err{background:#3a1a1a;color:#f87171}
.btn-primary{background:#2dd4bf;color:#0e1117;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px}
.btn-ghost:hover{border-color:#2dd4bf;color:#2dd4bf}
.btn-danger{background:#3a1a1a;color:#f87171;border:1px solid #5a2020;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px}
.btn-sm{padding:4px 10px;font-size:12px}
#log-output{background:#0e1117;border:1px solid #30363d;border-radius:6px;padding:12px 14px;font-family:monospace;font-size:12px;line-height:1.7;height:520px;overflow-y:auto;margin:10px}
.log-info{color:#79c0ff}.log-warn{color:#e3b341}.log-error{color:#f87171}.log-data{color:#2dd4bf}.log-debug{color:#8b949e}
.log-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:10px}
.file-table{width:100%;border-collapse:collapse;font-size:13px}
.file-table th{background:#0e1117;color:#8b949e;padding:6px 10px;text-align:left;border-bottom:1px solid #30363d;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.file-table td{padding:6px 10px;border-bottom:1px solid #1c2128;color:#c9d1d9}
.file-table tr:hover td{background:#161b22}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 20px;border-radius:6px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .25s,opacity .25s;opacity:0;z-index:9999}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.ok{background:#1a3a2e;color:#2dd4bf;border:1px solid #2dd4bf44}
#toast.warn{background:#2a2200;color:#e3b341;border:1px solid #e3b34144}
#toast.err{background:#3a1a1a;color:#f87171;border:1px solid #f8717144}
@media(max-width:600px){.two-col,.kpi-grid{grid-template-columns:1fr}.sidebar{width:44px;min-width:44px}}


/* ── Log-specific styles ── */
.log-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 10px 0}
.filter-btn{padding:4px 12px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #1e3a5f;background:transparent;color:#8b949e;transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:#2dd4bf;color:#c9d1d9}
.filter-btn.active{color:#0e1117;border-color:transparent}
.filter-btn.f-all.active,.filter-btn.f-info.active{background:#4a9fd4}
.filter-btn.f-data.active{background:#2dd4bf;color:#0e1117}
.filter-btn.f-warn.active{background:#e3b341;color:#0e1117}
.filter-btn.f-err.active{background:#f87171;color:#0e1117}
.search-box{flex:1;min-width:140px;max-width:280px;background:#09111e;border:1px solid #1e3a5f;border-radius:6px;color:#c9d1d9;padding:5px 10px;font-size:12px}
.search-box:focus{outline:none;border-color:#2dd4bf}
.search-box::placeholder{color:#4a6070}
.log-stats{font-size:11px;color:#8b949e;margin-left:auto;white-space:nowrap}
.log-table-wrap{margin:10px;border:1px solid #1e3a5f;border-radius:8px;overflow:hidden}
.log-table{width:100%;border-collapse:collapse;font-size:12px;font-family:monospace}
.log-table thead th{background:#09111e;color:#8b949e;padding:7px 10px;text-align:left;border-bottom:1px solid #1e3a5f;font-family:system-ui,sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;position:sticky;top:0;z-index:2}
.log-table tbody tr{border-bottom:1px solid #0d1e30}
.log-table tbody tr:last-child{border-bottom:none}
.log-table tbody tr:hover td{background:rgba(74,159,212,0.05)}
.log-table td{padding:5px 10px;vertical-align:top;line-height:1.5}
.td-idx{color:#4a6070;width:46px;text-align:right;padding-right:14px;user-select:none}
.td-time{color:#4a9fd4;width:80px;white-space:nowrap}
.td-lvl{width:46px}
.td-msg{color:#c9d1d9;word-break:break-all}
tr.lvl-WARN td{background:rgba(227,179,65,0.04)}
tr.lvl-ERR  td{background:rgba(248,113,113,0.06)}
tr.lvl-DATA td{background:rgba(45,212,191,0.03)}
.lvl-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.04em}
.lvl-INFO{background:#0d2040;color:#4a9fd4}
.lvl-WARN{background:#2a2200;color:#e3b341}
.lvl-ERR{background:#3a1a1a;color:#f87171}
.lvl-DATA{background:#0d3028;color:#2dd4bf}
.lvl-DBG{background:#1c2535;color:#8b949e}
mark{background:#e3b34133;color:inherit;border-radius:2px}
.log-footer{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#09111e;border-top:1px solid #1e3a5f;font-size:12px;color:#8b949e}
.log-scroll{height:calc(100dvh - 220px);min-height:300px;overflow-y:auto}
.live-dot{width:7px;height:7px;border-radius:50%;background:#2dd4bf;display:inline-block;margin-right:4px;animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.live-dot.paused{animation:none;background:#4a6070}
</style>

<script>
var allLines=[],filter='ALL',searchQ='',liveActive=true,liveTimer=null,lastTotal=0,BATCH=100;

function toast(msg,type,ms){
  type=type||'ok';ms=ms||3000;
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='show '+type;
  clearTimeout(t._tid);t._tid=setTimeout(function(){t.className=type;},ms);
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function highlight(text,q){
  if(!q) return escHtml(text);
  var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return escHtml(text).replace(re,'<mark>$1</mark>');
}
function parseLine(raw,idx){
  var m=raw.match(/^\[([\d:]+)\]\s+(\S+)\s+(.*)$/);
  if(m) return {i:idx,t:m[1],l:m[2].trim(),m:m[3]};
  return {i:idx,t:'',l:'INFO',m:raw};
}
function lvlBadge(lvl){
  var l=lvl.trim();
  var c=l==='WARN'?'lvl-WARN':l==='ERR'?'lvl-ERR':l==='DATA'?'lvl-DATA':l==='DBG'?'lvl-DBG':'lvl-INFO';
  return '<span class="lvl-badge '+c+'">'+l+'</span>';
}
function lineOk(o){
  var l=o.l.trim();
  if(filter!=='ALL'&&l!==filter) return false;
  if(searchQ&&o.m.toLowerCase().indexOf(searchQ)<0&&o.t.indexOf(searchQ)<0&&l.toLowerCase().indexOf(searchQ)<0) return false;
  return true;
}
function makeRow(o){
  var l=o.l.trim();
  var rc=l==='WARN'?'lvl-WARN':l==='ERR'?'lvl-ERR':l==='DATA'?'lvl-DATA':'';
  return '<tr class="'+rc+'"><td class="td-idx">'+o.i+'</td><td class="td-time">'+escHtml(o.t)+'</td><td class="td-lvl">'+lvlBadge(o.l)+'</td><td class="td-msg">'+highlight(o.m,searchQ)+'</td></tr>';
}
function render(){
  var rows='',shown=0;
  for(var i=0;i<allLines.length;i++){if(lineOk(allLines[i])){rows+=makeRow(allLines[i]);shown++;}}
  document.getElementById('log-tbody').innerHTML=rows||'<tr><td colspan="4" style="color:#8b949e;padding:16px 10px">Нет записей</td></tr>';
  document.getElementById('log-stats').textContent=shown+' / '+allLines.length+' строк';
  document.getElementById('footer-info').textContent='Показано '+shown+' из '+allLines.length+' · всего: '+lastTotal;
}
function loadAll(){
  fetch('/api/logs?count='+BATCH+'&offset=0').then(function(r){return r.json();}).then(function(d){
    lastTotal=parseInt(d.total)||0;
    allLines=(d.lines||[]).map(function(l,i){return parseLine(l,i);});
    render();
    if(lastTotal>BATCH) fetchPage(BATCH,lastTotal);
  }).catch(function(){toast('Ошибка загрузки','err');});
  fetch('/api/config').then(function(r){return r.json();}).then(function(d){if(d.eth_ip)document.getElementById('nav-ip').textContent=d.eth_ip;}).catch(function(){});
}
function fetchPage(from,total){
  if(from>=total) return;
  var cnt=Math.min(BATCH,total-from);
  fetch('/api/logs?count='+cnt+'&offset='+from).then(function(r){return r.json();}).then(function(d){
    (d.lines||[]).forEach(function(l,i){allLines.push(parseLine(l,from+i));});
    render();fetchPage(from+cnt,total);
  }).catch(function(){});
}
function pollNew(){
  fetch('/api/logs?count=50&offset='+allLines.length).then(function(r){return r.json();}).then(function(d){
    var lines=d.lines||[];if(!lines.length) return;
    var base=allLines.length;
    lines.forEach(function(l,i){allLines.push(parseLine(l,base+i));});
    lastTotal=parseInt(d.total)||lastTotal;
    var atBot=isAtBot();
    if(filter==='ALL'&&!searchQ){
      var frag='';lines.forEach(function(l,i){frag+=makeRow(allLines[base+i]);});
      var tb=document.getElementById('log-tbody');
      var emp=tb.querySelector('td[colspan]');if(emp)tb.innerHTML='';
      tb.insertAdjacentHTML('beforeend',frag);
    } else {render();}
    document.getElementById('log-stats').textContent=allLines.length+' / '+allLines.length+' строк';
    document.getElementById('footer-info').textContent='Строк: '+allLines.length+' · всего: '+lastTotal;
    if(atBot) scrollBottom();
  }).catch(function(){});
}
function isAtBot(){var s=document.getElementById('log-scroll');return s.scrollHeight-s.scrollTop-s.clientHeight<80;}
function scrollBottom(){var s=document.getElementById('log-scroll');s.scrollTop=s.scrollHeight;}
function setFilter(f){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('fb-'+f).classList.add('active');
  render();
}
function onSearch(){searchQ=document.getElementById('search-box').value.trim().toLowerCase();render();}
function toggleLive(){
  liveActive=!liveActive;
  var d1=document.getElementById('live-dot'),d2=document.getElementById('live-dot2');
  var ll=document.getElementById('live-label');
  var btn=document.getElementById('btn-live');
  if(liveActive){
    d1.className='live-dot';d2.className='live-dot';ll.textContent='Live';
    btn.innerHTML='<span class="live-dot" id="live-dot"></span>Live';
    startLive();
  } else {
    d1.className='live-dot paused';d2.className='live-dot paused';ll.textContent='Пауза';
    btn.innerHTML='<span class="live-dot paused" id="live-dot"></span>Пауза';
    clearInterval(liveTimer);
  }
}
function startLive(){clearInterval(liveTimer);liveTimer=setInterval(pollNew,3000);}
function clearLog(){
  if(!confirm('Очистить лог в RAM?')) return;
  fetch('/api/logs/clear',{method:'POST'})
    .then(function(r){return r.ok?r.json():Promise.reject(r.status);})
    .then(function(){allLines=[];lastTotal=0;render();toast('Лог очищен','ok');})
    .catch(function(){allLines=[];lastTotal=0;render();toast('Отображение очищено (API /api/logs/clear не реализован)','warn',5000);});
}
loadAll();startLive();setTimeout(scrollBottom,600);
</script>
</body>
