<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MonSet — Лог</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Geist+Mono:wght@300..600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f12;--s1:#131720;--s2:#181d28;--s3:#1e2435;
  --border:rgba(255,255,255,.07);--divider:rgba(255,255,255,.04);
  --text:#e8eaf0;--muted:#7b8499;--faint:#3d4357;
  --accent:#c8963c;--accent-dim:rgba(200,150,60,.12);
  --green:#4caf82;--green-dim:rgba(76,175,130,.12);
  --red:#e05555;--red-dim:rgba(224,85,85,.12);
  --yellow:#d4a017;--yellow-dim:rgba(212,160,23,.12);
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'Geist Mono','Fira Code',monospace;
  --r-sm:4px;--r-md:6px;--r-lg:10px;
  --t:160ms cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;min-height:100dvh;display:flex;flex-direction:column}
button{cursor:pointer;font:inherit;border:none;background:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--r-sm)}

nav{position:sticky;top:0;z-index:100;height:48px;display:flex;align-items:center;background:rgba(13,15,18,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;flex-shrink:0}
.nav-logo{display:flex;align-items:center;gap:8px;margin-right:auto}
.logo-name{font-weight:700;font-size:15px;letter-spacing:.03em}
.logo-dot{color:var(--accent)}
.nav-links{display:flex;gap:2px}
.nav-link{height:48px;padding:0 14px;display:flex;align-items:center;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;transition:color var(--t),border-color var(--t);text-decoration:none;white-space:nowrap}
.nav-link:hover{color:var(--text)}
.nav-link.active{color:var(--accent);border-bottom-color:var(--accent)}

.log-wrap{flex:1;display:flex;flex-direction:column;max-width:900px;margin:0 auto;padding:16px 20px 20px;width:100%}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.net-err{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,85,85,.2);padding:8px 14px;border-radius:var(--r-md);font-size:12px;font-family:var(--font-mono);display:none;margin-bottom:10px}
.btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r-md);font-size:13px;border:1px solid var(--border);transition:background var(--t),border-color var(--t),color var(--t)}
.btn-ghost{background:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--s3);color:var(--text)}
.btn-ghost.active{background:var(--accent-dim);border-color:rgba(200,150,60,.3);color:var(--accent)}
.sel{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:var(--r-md);font:inherit;font-size:13px}
.sel:focus{outline:2px solid var(--accent);outline-offset:1px}

.log-area-wrap{
  flex:1;position:relative;
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;
  display:flex;flex-direction:column;min-height:0;
}
.log-area{
  flex:1;overflow-y:scroll;padding:10px 14px;
  font-family:var(--font-mono);font-size:12px;line-height:1.7;
  scrollbar-width:thin;scrollbar-color:var(--s3) transparent;
}
.log-area::-webkit-scrollbar{width:6px}
.log-area::-webkit-scrollbar-track{background:transparent}
.log-area::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}

.log-line{display:flex;gap:10px;padding:1px 0}
.log-line:hover{background:rgba(255,255,255,.02)}
.l-ts{color:var(--faint);white-space:nowrap;flex-shrink:0}
.l-lvl{width:40px;flex-shrink:0;font-weight:600;letter-spacing:.04em}
.l-lvl.INFO{color:var(--muted)}
.l-lvl.WARN{color:var(--yellow)}
.l-lvl.ERR,.l-lvl.ERROR{color:var(--red)}
.l-lvl.DBG,.l-lvl.DEBUG{color:var(--faint)}
.l-lvl.OK{color:var(--green)}
.l-src{color:var(--faint);white-space:nowrap;flex-shrink:0;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.l-msg{color:var(--text);word-break:break-word}
.l-msg.ERR,.l-msg.ERROR{color:var(--red)}
.l-msg.WARN{color:var(--yellow)}

.log-foot{padding:6px 14px;border-top:1px solid var(--divider);display:flex;align-items:center;justify-content:space-between;font-family:var(--font-mono);font-size:11px;color:var(--faint)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-indicator{display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:11px;color:var(--muted)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
.live-dot.paused{background:var(--yellow);animation:none}

@media(max-width:600px){
  .nav-link span{display:none}
  .log-wrap{padding:10px 10px 12px}
  .l-src{display:none}
}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">
    <svg aria-label="MonSet" width="26" height="26" viewBox="0 0 26 26" fill="none">
      <rect x="2" y="2" width="22" height="22" rx="5" stroke="#c8963c" stroke-width="1.5"/>
      <path d="M7 17 L7 13 L10 9 L13 13 L16 9 L19 13 L19 17" stroke="#c8963c" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
      <circle cx="13" cy="7" r="1.5" fill="#c8963c"/>
    </svg>
    <span class="logo-name">Mon<span class="logo-dot">Set</span></span>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="index.html"><span>Dashboard</span></a>
    <a class="nav-link" href="config.html"><span>Конфиг</span></a>
    <a class="nav-link active" href="logs.html"><span>Лог</span></a>
    <a class="nav-link" href="files.html"><span>Файлы</span></a>
  </div>
</nav>

<div class="log-wrap">
  <div class="net-err" id="netErr">⚠ Нет связи с устройством</div>
  <div class="toolbar">
    <select class="sel" id="levelSel" onchange="applyFilter()">
      <option value="">Все уровни</option>
      <option value="DEBUG">DEBUG</option>
      <option value="INFO">INFO</option>
      <option value="WARN">WARN</option>
      <option value="ERR">ERR / ERROR</option>
    </select>
    <select class="sel" id="linesSel" onchange="applyFilter()">
      <option value="100">100 строк</option>
      <option value="200">200 строк</option>
      <option value="500">500 строк</option>
      <option value="1000">1000 строк</option>
    </select>
    <button class="btn btn-ghost" id="liveBtn" onclick="toggleLive()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M5.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      Live
    </button>
    <button class="btn btn-ghost" onclick="clearLog()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      Очистить
    </button>
    <button class="btn btn-ghost" onclick="downloadLog()" style="margin-left:auto">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Сохранить
    </button>
  </div>

  <div class="log-area-wrap">
    <div class="log-area" id="logArea"></div>
    <div class="log-foot">
      <div class="live-indicator"><div class="live-dot" id="liveDot"></div><span id="liveLabel">Live</span></div>
      <div id="lineCount">0 строк</div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
var liveOn=true, timer=null, rawLines=[], autoScroll=true;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function ftch(url){var c=new AbortController(),t=setTimeout(function(){c.abort()},6000);return fetch(url,{signal:c.signal}).finally(function(){clearTimeout(t)})}

function parseLine(raw){
  // Expected: "[HH:MM:SS] [LEVEL] [SRC] message" or "HH:MM:SS LEVEL SRC: message"
  var m=raw.match(/^(\[?[\d:\.]+\]?)\s+\[?([A-Z]+)\]?\s+(\[?[\w\.]+\]?)?\s*:?\s*(.*)/);
  if(m) return{ts:m[1].replace(/[\[\]]/g,''),lvl:m[2],src:(m[3]||'').replace(/[\[\]]/g,''),msg:m[4]};
  return{ts:'',lvl:'INFO',src:'',msg:raw};
}

function renderLines(lines){
  var area=document.getElementById('logArea');
  if(!lines.length){area.innerHTML='<div style="padding:20px;color:var(--faint);text-align:center">Лог пуст</div>';return;}
  var html=lines.map(function(raw){
    if(!raw.trim()) return '';
    var p=parseLine(raw);
    return '<div class="log-line">'+
      '<span class="l-ts">'+esc(p.ts)+'</span>'+
      '<span class="l-lvl '+esc(p.lvl)+'">'+esc(p.lvl)+'</span>'+
      (p.src?'<span class="l-src">'+esc(p.src)+'</span>':'')+
      '<span class="l-msg '+esc(p.lvl)+'">'+esc(p.msg)+'</span>'+
      '</div>';
  }).join('');
  area.innerHTML=html;
  document.getElementById('lineCount').textContent=lines.length+' строк';
  if(autoScroll) area.scrollTop=area.scrollHeight;
}

function applyFilter(){
  var lvl=document.getElementById('levelSel').value;
  var shown=lvl?rawLines.filter(function(l){
    var m=l.match(/\b(DEBUG|DBG|INFO|WARN|ERR|ERROR|OK)\b/i);
    var ll=(m&&m[1]||'').toUpperCase();
    if(lvl==='ERR') return ll==='ERR'||ll==='ERROR';
    return ll===lvl;
  }):rawLines;
  renderLines(shown);
}
window.applyFilter=applyFilter;

function load(){
  var n=document.getElementById('linesSel').value;
  var lvl=document.getElementById('levelSel').value;
  var url='/api/log?lines='+n+(lvl?'&level='+lvl:'');
  ftch(url).then(function(r){return r.text()}).then(function(t){
    document.getElementById('netErr').style.display='none';
    rawLines=t.split('\n').filter(function(l){return l.trim()});
    applyFilter();
  }).catch(function(){document.getElementById('netErr').style.display='block';});
}

window.toggleLive=function(){
  liveOn=!liveOn;
  var btn=document.getElementById('liveBtn');
  var dot=document.getElementById('liveDot');
  var lbl=document.getElementById('liveLabel');
  btn.classList.toggle('active',liveOn);
  dot.className='live-dot'+(liveOn?'':' paused');
  lbl.textContent=liveOn?'Live':'Пауза';
  if(liveOn){load();timer=setInterval(load,3000);}
  else{clearInterval(timer);}
};

window.clearLog=function(){
  rawLines=[];
  document.getElementById('logArea').innerHTML='<div style="padding:20px;color:var(--faint);text-align:center">Лог очищен</div>';
  document.getElementById('lineCount').textContent='0 строк';
};

window.downloadLog=function(){
  var text=rawLines.join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'}));
  a.download='monset-log-'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.txt';
  a.click();
};

var area=document.getElementById('logArea');
area.addEventListener('scroll',function(){
  autoScroll=area.scrollTop+area.clientHeight>=area.scrollHeight-20;
});

load();
timer=setInterval(load,3000);
})();
</script>
</body>
</html>
