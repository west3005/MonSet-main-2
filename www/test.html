<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0e1117;color:#c9d1d9;font:14px/1.5 system-ui,sans-serif;padding-bottom:70px}a{color:#2dd4bf;text-decoration:none}.nav{background:#161b22;border-bottom:1px solid #30363d;display:flex;gap:4px;padding:8px 12px}.nav a{padding:6px 14px;border-radius:6px;color:#c9d1d9;font-size:13px}.nav a.act{background:#2dd4bf;color:#0e1117;font-weight:600}.hdr{padding:14px 16px;border-bottom:1px solid #30363d;background:#161b22;font-size:18px;font-weight:700;color:#2dd4bf}details{background:#161b22;border:1px solid #30363d;border-radius:8px;margin:10px}summary{padding:10px 14px;cursor:pointer;font-weight:600;font-size:13px;color:#2dd4bf;user-select:none;list-style:none;display:flex;align-items:center;gap:6px}summary::before{content:"▶";font-size:10px;transition:transform .2s}details[open]>summary::before{transform:rotate(90deg)}.sc{padding:12px 14px 14px}.r{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;align-items:center}.f{display:flex;flex-direction:column;gap:3px;flex:1;min-width:120px}label{font-size:11px;color:#8b949e}input[type=text],input[type=number],input[type=password],select{background:#0e1117;border:1px solid #30363d;border-radius:5px;color:#c9d1d9;padding:5px 8px;font-size:13px;width:100%}input:focus,select:focus{outline:none;border-color:#2dd4bf}.tg{display:flex;align-items:center;gap:8px}.tg input[type=checkbox]{appearance:none;width:36px;height:20px;background:#30363d;border-radius:10px;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}.tg input[type=checkbox]:checked{background:#2dd4bf}.tg input[type=checkbox]::after{content:"";position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s}.tg input[type=checkbox]:checked::after{left:19px}.tg span{font-size:13px;white-space:nowrap}.btn{background:#2dd4bf;color:#0e1117;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:600}.btn:hover{opacity:.85}.btn.s{background:#30363d;color:#c9d1d9}.cd{background:#0e1117;border:1px solid #30363d;border-radius:6px;padding:10px;margin-bottom:8px}.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.tabs{display:flex;gap:4px;margin-bottom:10px}.tab{padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px;background:#0e1117;border:1px solid #30363d;color:#c9d1d9}.tab.act{background:#2dd4bf;color:#0e1117;border-color:#2dd4bf;font-weight:600}.tp{display:none}.tp.act{display:block}.bar{position:fixed;bottom:0;left:0;right:0;background:#161b22;border-top:1px solid #30363d;padding:10px 16px;display:flex;gap:8px;z-index:99}.dr{display:flex;align-items:center;gap:6px;background:#0e1117;border:1px solid #30363d;border-radius:5px;padding:5px 8px;margin-bottom:5px}.dr span{flex:1;font-size:12px}.dr button{background:none;border:none;color:#8b949e;cursor:pointer;font-size:14px;padding:0 2px}.dr button:hover{color:#2dd4bf}table{width:100%;border-collapse:collapse;font-size:12px}th{background:#0e1117;color:#8b949e;padding:5px 6px;text-align:left;border-bottom:1px solid #30363d}td{padding:4px 5px;border-bottom:1px solid #1c2128}td input,td select{padding:3px 5px;font-size:12px}.msg{display:none;padding:6px 12px;border-radius:5px;font-size:13px;font-weight:600}.ok{background:#1a3a2e;color:#2dd4bf}.er{background:#3a1a1a;color:#f87171}.warn{background:#2a2200;color:#e3b341}.sh{font-size:12px;color:#8b949e;margin:8px 0 4px;font-weight:600}

/* ── layout shell (sidebar + wrap) ─────────────────── */
body{padding:0;display:flex;flex-direction:row;min-height:100dvh}

.sidebar{
  width:52px;min-width:52px;
  background:#161b22;
  border-right:1px solid #30363d;
  display:flex;flex-direction:column;align-items:center;
  padding:10px 0;gap:2px;
  position:sticky;top:0;height:100dvh;
  flex-shrink:0;
}
.sidebar-logo{
  width:32px;height:32px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:center;
  color:#2dd4bf;
}
.sidebar a{
  width:38px;height:38px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:#8b949e;text-decoration:none;
  transition:color .15s,background .15s;
  position:relative;
}
.sidebar a:hover{color:#c9d1d9;background:#21262d}
.sidebar a.act{
  color:#0e1117;background:#2dd4bf;
}
.sidebar a.act::after{
  content:attr(title);
  position:absolute;left:48px;
  background:#161b22;color:#2dd4bf;
  font-size:11px;font-weight:600;
  padding:3px 8px;border-radius:4px;
  border:1px solid #30363d;
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .15s;
  z-index:100;
}
.sidebar a:hover::after{
  content:attr(title);
  position:absolute;left:48px;
  background:#161b22;color:#c9d1d9;
  font-size:11px;padding:3px 8px;border-radius:4px;
  border:1px solid #30363d;
  white-space:nowrap;pointer-events:none;
  opacity:1;z-index:100;
}
.sidebar-spacer{flex:1}
.sidebar-ver{
  font-size:10px;color:#484f58;
  writing-mode:vertical-rl;
  padding-bottom:6px;letter-spacing:.1em;
}

.wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* topbar — тонкая полоска с IP */
.topbar{
  background:#161b22;border-bottom:1px solid #30363d;
  height:40px;display:flex;align-items:center;
  padding:0 16px;gap:12px;flex-shrink:0;
}
.topbar-title{font-size:13px;font-weight:600;color:#2dd4bf;flex:1}
.topbar-ip{font-size:12px;color:#8b949e;font-family:monospace}

/* wrap > main */
.wrap main, .wrap > div:not(.topbar){padding:0}

/* ── доп. классы из index.html ──────────────────────── */
:root{--teal:#2dd4bf;--bg:#0e1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e}
.page-title{font-size:18px;font-weight:700;color:#2dd4bf;padding:14px 16px 0;margin-bottom:14px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin:10px}
.card+.card{margin-top:0}
.card-title{font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1c2128}
.stat-row:last-child{border-bottom:none}
.stat-key{font-size:12px;color:#8b949e}
.stat-val{font-size:12px;color:#c9d1d9;font-family:monospace;text-align:right}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin:10px}
.kpi{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px 16px}
.kpi-label{font-size:11px;color:#8b949e;font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:700;font-family:monospace;color:#c9d1d9}
.kpi-value.ok{color:#2dd4bf}.kpi-value.warn{color:#e3b341}.kpi-value.err{color:#f87171}
.kpi-unit{font-size:12px;color:#8b949e;margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.badge-ok{background:#1a3a2e;color:#2dd4bf}
.badge-warn{background:#2a2200;color:#e3b341}
.badge-err{background:#3a1a1a;color:#f87171}
.btn-primary{background:#2dd4bf;color:#0e1117;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px}
.btn-ghost:hover{border-color:#2dd4bf;color:#2dd4bf}
.btn-danger{background:#3a1a1a;color:#f87171;border:1px solid #5a2020;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px}
.btn-sm{padding:4px 10px;font-size:12px}
#log-output{background:#0e1117;border:1px solid #30363d;border-radius:6px;padding:12px 14px;font-family:monospace;font-size:12px;line-height:1.7;height:520px;overflow-y:auto;margin:10px}
.log-info{color:#79c0ff}.log-warn{color:#e3b341}.log-error{color:#f87171}.log-data{color:#2dd4bf}.log-debug{color:#8b949e}
.log-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:10px}
.file-table{width:100%;border-collapse:collapse;font-size:13px}
.file-table th{background:#0e1117;color:#8b949e;padding:6px 10px;text-align:left;border-bottom:1px solid #30363d;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.file-table td{padding:6px 10px;border-bottom:1px solid #1c2128;color:#c9d1d9}
.file-table tr:hover td{background:#161b22}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 20px;border-radius:6px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .25s,opacity .25s;opacity:0;z-index:9999}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.ok{background:#1a3a2e;color:#2dd4bf;border:1px solid #2dd4bf44}
#toast.warn{background:#2a2200;color:#e3b341;border:1px solid #e3b34144}
#toast.err{background:#3a1a1a;color:#f87171;border:1px solid #f8717144}
@media(max-width:600px){.two-col,.kpi-grid{grid-template-columns:1fr}.sidebar{width:44px;min-width:44px}}

</style>

<script>
var selectedChannel = null;

function toast(msg,type,ms){
  type=type||'ok'; ms=ms||4000;
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='show '+type;
  clearTimeout(t._tid);
  t._tid=setTimeout(function(){t.className=type;},ms);
}
function fmt(v){ return (v===undefined||v===null||v==='')?'—':String(v); }

/* ── Каналы из /api/channels ── */
function loadChannels(){
  fetch('/api/channels').then(function(r){return r.json();}).then(function(d){
    var ch=d.channels||[];
    // Таблица состояния
    var tbody=document.getElementById('ch-status-tbody');
    var rows='';
    ch.forEach(function(c){
      var cls=c.status==='ACTIVE'?'ok':c.status==='STANDBY'?'warn':'err';
      rows+='<tr><td>'+c.name+'</td>'
           +'<td><span class="badge badge-'+cls+'">'+c.status+'</span></td>'
           +'<td style="color:#8b949e">'+fmt(c.priority)+'</td></tr>';
    });
    tbody.innerHTML=rows||'<tr><td colspan="3" style="color:#8b949e">Нет данных</td></tr>';

    // Список радио-кнопок выбора канала
    var list=document.getElementById('ch-list');
    if(!ch.length){list.innerHTML='<div style="color:#8b949e;font-size:13px">Каналы не найдены</div>';return;}
    var html='';
    // Добавляем "авто" вариант
    var autos=selectedChannel===null?'checked':'';
    html+='<label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;background:'+(selectedChannel===null?'#0d2040':'transparent')+';border:1px solid '+(selectedChannel===null?'#2dd4bf':'#1e3a5f')+'">'
         +'<input type="radio" name="ch" value="auto" '+autos+' onchange="selectChannel(null)" style="accent-color:#2dd4bf">'
         +'<span style="font-size:13px;color:#c9d1d9">Авто (первый активный)</span>'
         +'</label>';
    ch.forEach(function(c){
      var sel=selectedChannel===c.name;
      var dis=c.status==='DISABLED';
      var bg=sel?'#0d2040':'transparent';
      var brd=sel?'#2dd4bf':'#1e3a5f';
      var col=dis?'#8b949e':'#c9d1d9';
      html+='<label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:'+(dis?'not-allowed':'pointer')+';background:'+bg+';border:1px solid '+brd+'">'
           +'<input type="radio" name="ch" value="'+c.name+'" '+(sel?'checked':'')+(dis?'disabled':'')
           +' onchange="selectChannel(\''+c.name+'\'')" style="accent-color:#2dd4bf">'
           +'<span style="font-size:13px;color:'+col+'">'+c.name+'</span>'
           +'<span class="badge badge-'+(c.status==='ACTIVE'?'ok':c.status==='STANDBY'?'warn':'err')+'" style="margin-left:auto">'+c.status+'</span>'
           +'</label>';
    });
    list.innerHTML=html;
    // IP
    if(d.eth_ip) document.getElementById('nav-ip').textContent=d.eth_ip;
  }).catch(function(){toast('Ошибка загрузки каналов','err');});
}

function selectChannel(name){
  selectedChannel=name;
  loadChannels(); // перерисовываем выделение
}

/* ── KV-строки ── */
var rowId=0;
function addRow(k,v){
  k=k||''; v=v||'';
  rowId++;
  var id=rowId;
  var div=document.createElement('div');
  div.id='kv-'+id;
  div.style.cssText='display:flex;gap:6px;align-items:center';
  div.innerHTML='<input type="text" placeholder="ключ" value="'+k+'" oninput="updatePreview()" style="flex:1;min-width:80px">'
               +'<input type="text" placeholder="значение" value="'+v+'" oninput="updatePreview()" style="flex:2;min-width:100px">'
               +'<button onclick="removeRow('+id+')" style="background:none;border:none;color:#8b949e;cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0" title="Удалить">✕</button>';
  document.getElementById('kv-list').appendChild(div);
  updatePreview();
}
function removeRow(id){
  var el=document.getElementById('kv-'+id);
  if(el) el.remove();
  updatePreview();
}
function getKV(){
  var obj={};
  var rows=document.getElementById('kv-list').querySelectorAll('div[id^="kv-"]');
  rows.forEach(function(row){
    var inputs=row.querySelectorAll('input');
    var k=inputs[0].value.trim();
    var v=inputs[1].value.trim();
    if(!k) return;
    var n=parseFloat(v);
    obj[k]=(v!==''&&!isNaN(n))?n:v;
  });
  return obj;
}
function updatePreview(){
  var kv=getKV();
  var payload={};
  if(selectedChannel) payload.channel=selectedChannel;
  payload.values=kv;
  document.getElementById('json-preview').textContent=JSON.stringify(payload,null,2);
}

function resetForm(){
  selectedChannel=null;
  document.getElementById('kv-list').innerHTML='';
  rowId=0;
  updatePreview();
  loadChannels();
  document.getElementById('send-msg').style.display='none';
}

/* ── Отправка ── */
function doSend(){
  var kv=getKV();
  var btn=document.getElementById('btn-send');
  btn.disabled=true; btn.textContent='Отправка…';
  var msg=document.getElementById('send-msg');
  msg.style.display='none';

  // POST /api/test_send — тело JSON с выбранным каналом и значениями
  // Если бэкенд ещё не поддерживает параметры — отправим всё равно (triggerTestSend() сработает)
  var body=JSON.stringify({
    channel: selectedChannel||'auto',
    values:  kv
  });

  fetch('/api/test_send', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: body
  }).then(function(r){return r.json();}).then(function(d){
    btn.disabled=false; btn.textContent='▶ Отправить';
    if(d.ok||d.status==='pending'||d.status==='sending'){
      toast('Тест запущен','ok');
      msg.style.cssText='display:block;color:#2dd4bf;font-size:13px';
      msg.textContent='✓ Команда принята. Ожидайте результат…';
      // Начинаем поллинг результата каждые 2 сек
      var t=setInterval(function(){
        pollResult(function(done){ if(done) clearInterval(t); });
      },2000);
      setTimeout(function(){clearInterval(t);},30000);
    }
  }).catch(function(){
    btn.disabled=false; btn.textContent='▶ Отправить';
    toast('Ошибка связи с устройством','err');
    msg.style.cssText='display:block;color:#f87171;font-size:13px';
    msg.textContent='✗ Нет связи с устройством';
  });
}

/* ── Результат ── */
function pollResult(cb){
  fetch('/api/test_result').then(function(r){return r.json();}).then(function(d){
    document.getElementById('r-status').textContent  = fmt(d.status);
    document.getElementById('r-channel').textContent = fmt(d.channel);
    document.getElementById('r-http').textContent    = d.http_code||'—';
    document.getElementById('r-elapsed').textContent = d.elapsed_ms?d.elapsed_ms+' ms':'—';
    var badge=document.getElementById('result-badge');
    var done=false;
    if(d.status==='success'){
      badge.style.cssText='display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;background:#1a3a2e;color:#2dd4bf';
      badge.textContent='✓ Успешно';
      done=true;
    } else if(d.status==='fail'){
      badge.style.cssText='display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;background:#3a1a1a;color:#f87171';
      badge.textContent='✗ Ошибка';
      done=true;
    } else if(d.status&&d.status!=='idle'){
      badge.style.cssText='display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;background:#2a2200;color:#e3b341';
      badge.textContent='⏳ '+d.status;
    } else {
      badge.style.cssText='display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;background:#1c2535;color:#8b949e';
      badge.textContent='Нет данных';
    }
    if(cb) cb(done);
  }).catch(function(){});
}

/* ── Инициализация ── */
loadChannels();
pollResult();
addRow('temperature','23.5');
addRow('pressure','1013.2');
updatePreview();
setInterval(loadChannels, 15000);
</script>
