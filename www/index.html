<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MonSet — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Geist+Mono:wght@300..600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f12;--s1:#131720;--s2:#181d28;--s3:#1e2435;
  --border:rgba(255,255,255,.07);--divider:rgba(255,255,255,.04);
  --text:#e8eaf0;--muted:#7b8499;--faint:#3d4357;
  --accent:#c8963c;--accent-dim:rgba(200,150,60,.12);
  --green:#4caf82;--green-dim:rgba(76,175,130,.12);
  --red:#e05555;--red-dim:rgba(224,85,85,.12);
  --yellow:#d4a017;--yellow-dim:rgba(212,160,23,.12);
  --blue:#4e8fcf;--blue-dim:rgba(78,143,207,.12);
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'Geist Mono','Fira Code',monospace;
  --r-sm:4px;--r-md:6px;--r-lg:10px;--r-xl:14px;
  --t:160ms cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;min-height:100dvh}
button{cursor:pointer;font:inherit;border:none;background:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--r-sm)}

nav{position:sticky;top:0;z-index:100;height:48px;display:flex;align-items:center;background:rgba(13,15,18,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px}
.nav-logo{display:flex;align-items:center;gap:8px;margin-right:auto}
.logo-name{font-weight:700;font-size:15px;letter-spacing:.03em}
.logo-dot{color:var(--accent)}
.nav-links{display:flex;gap:2px}
.nav-link{height:48px;padding:0 14px;display:flex;align-items:center;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;transition:color var(--t),border-color var(--t);text-decoration:none;white-space:nowrap}
.nav-link:hover{color:var(--text)}
.nav-link.active{color:var(--accent);border-bottom-color:var(--accent)}

main{max-width:900px;margin:0 auto;padding:20px 20px 40px}
.page-header{margin-bottom:18px;display:flex;align-items:baseline;gap:10px}
.page-title{font-size:15px;font-weight:600;color:var(--text)}
.page-sub{font-size:12px;color:var(--muted);font-family:var(--font-mono)}
.net-err{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,85,85,.2);padding:10px 16px;border-radius:var(--r-md);font-size:12px;font-family:var(--font-mono);display:none;margin-bottom:14px}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px}
.kpi-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.kpi-val{font-family:var(--font-mono);font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.01em;line-height:1}
.kpi-val.ok{color:var(--green)}
.kpi-val.warn{color:var(--yellow)}
.kpi-val.bad{color:var(--red)}
.kpi-meta{font-size:11px;color:var(--faint);margin-top:4px}

.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px}
.card-head{padding:11px 16px;border-bottom:1px solid var(--divider);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px}
.card-title-dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}
.card-body{padding:14px 16px}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.info-list{display:flex;flex-direction:column;gap:0}
.info-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--divider);font-size:13px}
.info-item:last-child{border-bottom:none}
.info-key{color:var(--muted)}
.info-val{font-family:var(--font-mono);font-size:12px;color:var(--text)}

.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.badge.ok{background:var(--green-dim);color:var(--green)}
.badge.bad{background:var(--red-dim);color:var(--red)}
.badge.warn{background:var(--yellow-dim);color:var(--yellow)}
.badge.info{background:var(--blue-dim);color:var(--blue)}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}

.log-box{background:var(--s2);border-radius:var(--r-md);padding:12px;font-family:var(--font-mono);font-size:11px;color:var(--muted);max-height:140px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;display:inline-block}

@media(max-width:600px){
  main{padding:12px 12px 32px}
  .nav-link span{display:none}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .row2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">
    <svg aria-label="MonSet" width="26" height="26" viewBox="0 0 26 26" fill="none">
      <rect x="2" y="2" width="22" height="22" rx="5" stroke="#c8963c" stroke-width="1.5"/>
      <path d="M7 17 L7 13 L10 9 L13 13 L16 9 L19 13 L19 17" stroke="#c8963c" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
      <circle cx="13" cy="7" r="1.5" fill="#c8963c"/>
    </svg>
    <span class="logo-name">Mon<span class="logo-dot">Set</span></span>
  </div>
  <div class="nav-links">
    <a class="nav-link active" href="index.html"><span>Dashboard</span></a>
    <a class="nav-link" href="config.html"><span>Конфиг</span></a>
    <a class="nav-link" href="logs.html"><span>Лог</span></a>
    <a class="nav-link" href="files.html"><span>Файлы</span></a>
  </div>
</nav>

<main>
  <div class="net-err" id="netErr">⚠ Нет связи с устройством</div>
  <div class="page-header">
    <div class="page-title">Dashboard</div>
    <div class="live-dot" title="Обновление в реальном времени"></div>
    <div class="page-sub" id="lastUpdate">—</div>
  </div>

  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Статус</div><div class="kpi-val" id="kStatus">—</div><div class="kpi-meta" id="kUptime">—</div></div>
    <div class="kpi"><div class="kpi-label">SD</div><div class="kpi-val" id="kSd">—</div><div class="kpi-meta" id="kSdMeta">—</div></div>
    <div class="kpi"><div class="kpi-label">IP адрес</div><div class="kpi-val" id="kIp" style="font-size:16px">—</div><div class="kpi-meta" id="kMac">—</div></div>
    <div class="kpi"><div class="kpi-label">RAM свободно</div><div class="kpi-val" id="kRam">—</div><div class="kpi-meta" id="kRamT">—</div></div>
    <div class="kpi"><div class="kpi-label">Modem</div><div class="kpi-val" id="kModem" style="font-size:16px">—</div><div class="kpi-meta" id="kModemMeta">—</div></div>
    <div class="kpi"><div class="kpi-label">Iridium</div><div class="kpi-val" id="kIrid" style="font-size:16px">—</div><div class="kpi-meta" id="kIridMeta">—</div></div>
  </div>

  <div class="row2">
    <div class="card">
      <div class="card-head"><div class="card-title"><div class="card-title-dot"></div>Сеть</div></div>
      <div class="card-body">
        <div class="info-list">
          <div class="info-item"><span class="info-key">SSID</span><span class="info-val" id="iSsid">—</span></div>
          <div class="info-item"><span class="info-key">Gateway</span><span class="info-val" id="iGw">—</span></div>
          <div class="info-item"><span class="info-key">DNS</span><span class="info-val" id="iDns">—</span></div>
          <div class="info-item"><span class="info-key">Сигнал</span><span class="info-val" id="iRssi">—</span></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title"><div class="card-title-dot"></div>Система</div></div>
      <div class="card-body">
        <div class="info-list">
          <div class="info-item"><span class="info-key">Прошивка</span><span class="info-val" id="iFw">—</span></div>
          <div class="info-item"><span class="info-key">MCU</span><span class="info-val" id="iMcu">—</span></div>
          <div class="info-item"><span class="info-key">Flash</span><span class="info-val" id="iFlash">—</span></div>
          <div class="info-item"><span class="info-key">Температура</span><span class="info-val" id="iTemp">—</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><div class="card-title"><div class="card-title-dot"></div>Последние события</div></div>
    <div class="card-body"><div class="log-box" id="logBox">Загрузка...</div></div>
  </div>
</main>

<script>
(function(){
'use strict';
function ftch(url){var c=new AbortController(),t=setTimeout(function(){c.abort()},6000);return fetch(url,{signal:c.signal}).finally(function(){clearTimeout(t)})}
function set(id,v){var el=document.getElementById(id);if(el)el.textContent=v==null?'—':v;}
function fmt(ms){
  if(ms==null) return '—';
  var s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60),d=Math.floor(h/24);
  if(d>0) return d+'д '+( h%24)+'ч';
  if(h>0) return h+'ч '+(m%60)+'м';
  if(m>0) return m+'м '+(s%60)+'с';
  return s+'с';
}
function fmtMem(b){if(b==null) return '—'; return b>=1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(0)+' KB';}
function color(id,cls){var el=document.getElementById(id);if(!el) return;el.className='kpi-val '+cls;}

function load(){
  ftch('/api/status').then(function(r){return r.json()}).then(function(d){
    document.getElementById('netErr').style.display='none';
    var now=new Date();
    document.getElementById('lastUpdate').textContent=now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

    set('kStatus',d.running?'OK':'Стоп');
    color('kStatus',d.running?'ok':'bad');
    set('kUptime','uptime: '+fmt(d.uptime_ms));

    var sdOk=d.sd_mounted;
    set('kSd',sdOk?'Смонтирована':'Нет');
    color('kSd',sdOk?'ok':'bad');
    set('kSdMeta',d.sd_total?fmtMem(d.sd_free)+' / '+fmtMem(d.sd_total):'—');

    set('kIp',d.ip||'—');
    set('kMac',d.mac||'');

    set('kRam',fmtMem(d.ram_free));
    color('kRam',d.ram_free>50000?'ok':d.ram_free>20000?'warn':'bad');
    set('kRamT','из '+fmtMem(d.ram_total));

    set('kModem',d.modem_state||'—');
    color('kModem',d.modem_ok?'ok':'warn');
    set('kModemMeta',d.modem_apn||'');

    set('kIrid',d.iridium_state||'—');
    color('kIrid',d.iridium_ok?'ok':'warn');
    set('kIridMeta',d.iridium_signal!=null?'RSSI: '+d.iridium_signal:'');

    set('iSsid',d.ssid||'—');
    set('iGw',d.gw||'—');
    set('iDns',d.dns||'—');
    set('iRssi',d.rssi!=null?d.rssi+' dBm':'—');

    set('iFw',d.fw||'—');
    set('iMcu',d.mcu||'—');
    set('iFlash',fmtMem(d.flash));
    set('iTemp',d.temp_c!=null?d.temp_c.toFixed(1)+' °C':'—');

  }).catch(function(){document.getElementById('netErr').style.display='block';});

  ftch('/api/log?lines=20&level=WARN').then(function(r){return r.text()}).then(function(t){
    var box=document.getElementById('logBox');
    box.textContent=t.trim()||'— нет событий —';
    box.scrollTop=box.scrollHeight;
  }).catch(function(){});
}

load();
setInterval(load,5000);
})();
</script>
</body>
</html>
