<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MonSet — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0b0f1a; --surface:#111928; --surface2:#1a2436;
    --border:rgba(100,160,220,0.12);
    --text:#c8d4e0; --muted:#6a8099; --faint:#2e3f52;
    --accent:#2196f3; --accent-h:#42a5f5;
    --green:#43a047; --yellow:#fb8c00; --red:#e53935;
    --green-bg:rgba(67,160,71,0.15); --yellow-bg:rgba(251,140,0,0.15); --red-bg:rgba(229,57,53,0.15);
    --radius:4px; --radius-lg:6px;
    --mono:'Courier New',monospace;
    --hdr-bg:#0d2040;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:14px;-webkit-font-smoothing:antialiased}
  body{background:var(--bg);color:var(--text);font-family:'Roboto','Inter','Helvetica Neue',sans-serif;min-height:100dvh;display:flex;flex-direction:column}
  a{color:var(--accent);text-decoration:none} a:hover{color:var(--accent-h)}
  button{cursor:pointer;border:none;font:inherit}
  nav{background:#0a1525;border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:0;height:52px}
  .nav-logo{display:flex;align-items:center;gap:8px;margin-right:28px;color:#64b5f6;font-weight:700;font-size:15px;letter-spacing:.03em}
  nav a{color:var(--muted);font-size:13px;font-weight:500;padding:0 14px;height:52px;display:flex;align-items:center;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
  nav a:hover{color:var(--text)} nav a.active{color:#64b5f6;border-bottom-color:#2196f3}
  .nav-spacer{flex:1}
  .nav-status{font-size:11px;color:var(--faint);font-family:var(--mono)}
  main{flex:1;padding:20px 24px;max-width:1040px;margin:0 auto;width:100%}
  .page-title{font-size:18px;font-weight:400;color:var(--text);margin-bottom:18px;letter-spacing:.01em}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
  .card+.card{margin-top:14px}
  .card-title{font-size:11px;font-weight:600;color:#4a8ab0;text-transform:uppercase;letter-spacing:.09em;margin-bottom:14px}
  .card-header{background:var(--hdr-bg);border-radius:var(--radius) var(--radius) 0 0;padding:8px 16px;margin:-20px -20px 16px -20px;border-bottom:1px solid var(--border)}
  .card-header h2{font-size:13px;font-weight:500;color:#90caf9}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500}
  input[type=text],input[type=number],input[type=password],select,textarea{width:100%;padding:7px 10px;background:#0b1929;color:var(--text);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none;transition:border-color .15s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-row.three{grid-template-columns:1fr 1fr 1fr}
  .form-field{display:flex;flex-direction:column}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s,color .15s}
  .btn-primary{background:var(--accent);color:#fff} .btn-primary:hover{background:var(--accent-h)}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)} .btn-ghost:hover{color:var(--text);border-color:rgba(100,160,220,0.3)}
  .btn-danger{background:var(--red-bg);color:#ef9a9a;border:1px solid rgba(229,57,53,0.25)} .btn-danger:hover{background:rgba(229,57,53,0.25)}
  .btn-sm{padding:4px 10px;font-size:12px}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600;letter-spacing:.04em}
  .badge-ok{background:var(--green-bg);color:#81c784} .badge-warn{background:var(--yellow-bg);color:#ffb74d} .badge-err{background:var(--red-bg);color:#e57373}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .25s,opacity .25s;opacity:0;z-index:9999}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  #toast.ok{background:var(--green-bg);color:#81c784;border:1px solid rgba(67,160,71,.4)}
  #toast.warn{background:var(--yellow-bg);color:#ffb74d;border:1px solid rgba(251,140,0,.4)}
  #toast.err{background:var(--red-bg);color:#e57373;border:1px solid rgba(229,57,53,.4)}
  .acc-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:14px 20px;margin:-20px -20px 0;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
  .acc-hdr:hover{background:rgba(33,150,243,0.04)}
  .acc-hdr h2{font-size:13px;font-weight:500;color:#90caf9}
  .acc-arrow{color:var(--muted);transition:transform .2s;font-size:11px}
  .acc-arrow.open{transform:rotate(90deg)}
  .acc-body{margin-top:20px;display:none} .acc-body.open{display:block}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px}
  .kpi-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
  .kpi-value{font-size:24px;font-weight:700;font-family:var(--mono);color:#64b5f6;letter-spacing:-.02em;line-height:1}
  .kpi-value.ok{color:#81c784} .kpi-value.warn{color:#ffb74d} .kpi-value.err{color:#e57373}
  .kpi-unit{font-size:12px;color:var(--muted);margin-top:4px}
  #log-output{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-family:var(--mono);font-size:11.5px;line-height:1.6;height:480px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
  .log-info{color:#4a90d9} .log-warn{color:#fb8c00} .log-error{color:#e57373} .log-data{color:#4db6a8} .log-debug{color:#888}
  .file-table{width:100%;border-collapse:collapse}
  .file-table th{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
  .file-table td{padding:9px 12px;font-size:13px;border-bottom:1px solid var(--border)}
  .file-table tr:last-child td{border-bottom:none}
  .file-table tr:hover td{background:oklch(from var(--text) 0.15 0 0 / 0.04)}
  .file-icon{margin-right:6px;color:var(--accent)}
  .file-size{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .drop-zone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:32px;text-align:center;color:var(--muted);transition:border-color .15s,background .15s;cursor:pointer}
  .drop-zone.drag-over{border-color:var(--accent);background:var(--yellow-bg)}
  .progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px;display:none}
  .progress-fill{height:100%;background:var(--accent);width:0;transition:width .1s;border-radius:2px}
  @media(max-width:600px){main{padding:16px}.form-row,.form-row.three{grid-template-columns:1fr}.kpi-grid{grid-template-columns:1fr 1fr}}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.stat-row:last-child{border-bottom:none}
.stat-key{color:var(--muted)}
.stat-val{font-family:var(--mono);font-size:12px;color:var(--text)}
#mini-log{height:90px;font-size:11px;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:8px;font-family:var(--mono);line-height:1.5}
</style>
</head>
<body>
<nav>
<div class="nav-logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-label="MonSet"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><polyline points="7 10 10 7 13 10 16 7"/></svg>MonSet</div>
<a href="/" class="active">Dashboard</a><a href="/config">Config</a><a href="/logs">Logs</a><a href="/files">Files</a>
<div class="nav-spacer"></div>
<span class="nav-status" id="nav-ip">—</span>
</nav>
<main>
  <h1 class="page-title">Dashboard</h1>
  <div class="kpi-grid" id="kpi-grid">
    <div class="kpi"><div class="kpi-label">Uptime</div><div class="kpi-value" id="kpi-uptime">—</div><div class="kpi-unit">hh:mm:ss</div></div>
    <div class="kpi"><div class="kpi-label">SD Card</div><div class="kpi-value" id="kpi-sd">—</div><div class="kpi-unit" id="kpi-sd-size">—</div></div>
    <div class="kpi"><div class="kpi-label">Free Heap</div><div class="kpi-value" id="kpi-heap">—</div><div class="kpi-unit">bytes</div></div>
    <div class="kpi"><div class="kpi-label">IP Address</div><div class="kpi-value" id="kpi-ip" style="font-size:16px">—</div><div class="kpi-unit" id="kpi-net-mode">—</div></div>
    <div class="kpi"><div class="kpi-label">RSSI</div><div class="kpi-value" id="kpi-rssi">—</div><div class="kpi-unit">dBm</div></div>
    <div class="kpi"><div class="kpi-label">Last Save</div><div class="kpi-value" id="kpi-save" style="font-size:14px">—</div><div class="kpi-unit" id="kpi-save-status">—</div></div>
  </div>
  <div class="two-col">
    <div class="card">
      <div class="card-title">Сеть</div>
      <div class="stat-row"><span class="stat-key">SSID</span><span class="stat-val" id="s-ssid">—</span></div>
      <div class="stat-row"><span class="stat-key">MAC</span><span class="stat-val" id="s-mac">—</span></div>
      <div class="stat-row"><span class="stat-key">Gateway</span><span class="stat-val" id="s-gw">—</span></div>
      <div class="stat-row"><span class="stat-key">DNS</span><span class="stat-val" id="s-dns">—</span></div>
      <div class="stat-row"><span class="stat-key">Соединений</span><span class="stat-val" id="s-conn">—</span></div>
      <div class="stat-row"><span class="stat-key">Rx / Tx</span><span class="stat-val" id="s-rxtx">—</span></div>
    </div>
    <div class="card">
      <div class="card-title">Система</div>
      <div class="stat-row"><span class="stat-key">CPU</span><span class="stat-val" id="s-cpu">—</span></div>
      <div class="stat-row"><span class="stat-key">Температура</span><span class="stat-val" id="s-temp">—</span></div>
      <div class="stat-row"><span class="stat-key">SD путь конфига</span><span class="stat-val" id="s-cfgpath">—</span></div>
      <div class="stat-row"><span class="stat-key">SD записей</span><span class="stat-val" id="s-sdwrites">—</span></div>
      <div class="stat-row"><span class="stat-key">Прошивка</span><span class="stat-val" id="s-fw">—</span></div>
      <div class="stat-row"><span class="stat-key">Дата сборки</span><span class="stat-val" id="s-built">—</span></div>
    </div>
  </div>
  <div class="card" style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="card-title" style="margin-bottom:0">Последние события</div>
      <a href="/logs" style="font-size:12px;color:var(--accent)">все логи →</a>
    </div>
    <div id="mini-log"></div>
  </div>
</main>
<div id="toast"></div>
<script>

function toast(msg,type,ms){
  type=type||'ok'; ms=ms||6000;
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='show '+type;
  clearTimeout(t._tid);
  t._tid=setTimeout(function(){t.className=type;},ms);
}

function colorKpi(id,val,okMin,warnMin){
  var el=document.getElementById(id);
  if(!el) return;
  var cls='err';
  if(val>=okMin) cls='ok';
  else if(val>=warnMin) cls='warn';
  el.className='kpi-value '+cls;
}
function fmt(s){
  if(s===undefined||s===null||s==='') return '—';
  return String(s);
}
function fmtUptime(s){
  s=parseInt(s)||0;
  var h=Math.floor(s/3600), m=Math.floor(s%3600/60), sec=s%60;
  return (h?String(h).padStart(2,'0')+':':'')+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}
function colorLog(line){
  if(/\[ERR/i.test(line)||/ERROR/i.test(line)) return '<span class="log-error">'+line+'</span>';
  if(/\[WRN/i.test(line)||/WARN/i.test(line))  return '<span class="log-warn">'+line+'</span>';
  if(/\[DATA/i.test(line))  return '<span class="log-data">'+line+'</span>';
  if(/\[DBG/i.test(line))   return '<span class="log-debug">'+line+'</span>';
  return '<span class="log-info">'+line+'</span>';
}
function poll(){
  fetch('/api/status').then(r=>r.json()).then(function(d){
    document.getElementById('kpi-uptime').textContent=fmtUptime(d.uptime_s);
    var sdOk=d.sd_ok||d.sd_status==='ok';
    var sdEl=document.getElementById('kpi-sd');
    sdEl.textContent=sdOk?'OK':'FAIL';
    sdEl.className='kpi-value '+(sdOk?'ok':'err');
    document.getElementById('kpi-sd-size').textContent=d.sd_free?d.sd_free+' free':'—';
    var heap=parseInt(d.free_heap)||0;
    document.getElementById('kpi-heap').textContent=heap?heap.toLocaleString():'—';
    colorKpi('kpi-heap',heap,40000,15000);
    var ip=d.ip||d.ip_address||'—';
    document.getElementById('kpi-ip').textContent=ip;
    document.getElementById('kpi-net-mode').textContent=d.net_mode||d.mode||'—';
    document.getElementById('nav-ip').textContent=ip;
    var rssi=parseInt(d.rssi)||0;
    document.getElementById('kpi-rssi').textContent=rssi?rssi:'—';
    colorKpi('kpi-rssi',rssi,-60,-80);
    document.getElementById('kpi-save').textContent=d.last_save_time||'—';
    document.getElementById('kpi-save-status').textContent=d.last_save_ok?'на SD':'в RAM';
    document.getElementById('s-ssid').textContent=fmt(d.ssid);
    document.getElementById('s-mac').textContent=fmt(d.mac);
    document.getElementById('s-gw').textContent=fmt(d.gateway);
    document.getElementById('s-dns').textContent=fmt(d.dns);
    document.getElementById('s-conn').textContent=fmt(d.connections);
    document.getElementById('s-rxtx').textContent=(d.rx_bytes||'?')+' / '+(d.tx_bytes||'?');
    document.getElementById('s-cpu').textContent=d.cpu_load!==undefined?d.cpu_load+'%':'—';
    document.getElementById('s-temp').textContent=d.temp_c!==undefined?d.temp_c+' °C':'—';
    document.getElementById('s-cfgpath').textContent=fmt(d.config_path);
    document.getElementById('s-sdwrites').textContent=fmt(d.sd_writes);
    document.getElementById('s-fw').textContent=fmt(d.firmware);
    document.getElementById('s-built').textContent=fmt(d.build_date);
    var log=document.getElementById('mini-log');
    if(d.last_lines&&Array.isArray(d.last_lines)){
      log.innerHTML=d.last_lines.slice(-6).map(colorLog).join('\n');
      log.scrollTop=log.scrollHeight;
    }
  }).catch(function(){toast('Нет связи с устройством','err');});
}
poll(); setInterval(poll,5000);
</script>
</body>
</html>
