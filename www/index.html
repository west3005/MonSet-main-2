<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MonSet — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1626;
  --sidebar:#060e1c;
  --surface:#0f1e33;
  --surface2:#162540;
  --hdr:#1a3a5c;
  --border:rgba(90,140,200,0.13);
  --text:#ddeeff;
  --muted:#7a9cc0;
  --faint:#2a4060;
  --accent:#5ba3d9;
  --accent-h:#7bc0f0;
  --accent-dark:#1565c0;
  --green:#43a868; --yellow:#e6a817; --red:#d95040;
  --green-bg:rgba(67,168,104,0.15); --yellow-bg:rgba(230,168,23,0.15); --red-bg:rgba(217,80,64,0.15);
  --mono:'IBM Plex Mono','Courier New',monospace;
  --r:4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans','Roboto','Helvetica Neue',sans-serif;min-height:100dvh;display:flex;flex-direction:row}

/* ── Sidebar ─────────────────────────────────────────── */
.sidebar{
  width:56px;min-width:56px;background:var(--sidebar);
  display:flex;flex-direction:column;align-items:center;
  padding:12px 0;gap:4px;border-right:1px solid var(--border);
  position:sticky;top:0;height:100dvh;
}
.sidebar-logo{
  width:34px;height:34px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);
}
.sidebar a{
  width:40px;height:40px;border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);text-decoration:none;
  transition:color .15s,background .15s;
  position:relative;
}
.sidebar a:hover{color:var(--accent-h);background:rgba(91,163,217,0.1)}
.sidebar a.active{color:var(--accent);background:rgba(91,163,217,0.15)}
.sidebar a.active::before{
  content:'';position:absolute;left:0;top:8px;bottom:8px;
  width:3px;background:var(--accent);border-radius:0 2px 2px 0;
}
.sidebar-spacer{flex:1}

/* ── Wrap (topbar + main) ─────────────────────────────── */
.wrap{flex:1;display:flex;flex-direction:column;min-width:0}

/* ── Topbar ──────────────────────────────────────────── */
.topbar{
  height:48px;background:var(--sidebar);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;
}
.topbar-title{font-size:14px;font-weight:500;color:var(--text);flex:1}
.topbar-badge{
  font-size:11px;font-weight:600;padding:2px 8px;
  border-radius:var(--r);background:var(--hdr);color:var(--accent);
  border:1px solid rgba(91,163,217,0.25);letter-spacing:.04em;
}

/* ── Main content ────────────────────────────────────── */
main{flex:1;padding:20px 24px;overflow:auto}

/* ── Cards ───────────────────────────────────────────── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  margin-bottom:14px;
  overflow:hidden;
}
.card-hdr{
  background:var(--hdr);
  padding:8px 16px;
  font-size:12px;font-weight:600;color:var(--accent);
  text-transform:uppercase;letter-spacing:.09em;
  border-bottom:1px solid var(--border);
}
.card-body{padding:16px}
.card-title{
  font-size:11px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.09em;margin-bottom:14px;
}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── KPI grid ────────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.kpi{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 16px;
}
.kpi-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:300;font-family:var(--mono);color:var(--accent-h);letter-spacing:-.01em}
.kpi-value.ok{color:#5dd68a} .kpi-value.warn{color:#f0b429} .kpi-value.err{color:#e06060}
.kpi-unit{font-size:11px;color:var(--muted);margin-top:3px}

/* ── Stat rows ───────────────────────────────────────── */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-key{font-size:12px;color:var(--muted)}
.stat-val{font-size:12px;color:var(--text);font-family:var(--mono);text-align:right}

/* ── Sensor block ────────────────────────────────────── */
.sensor-big{text-align:center;padding:20px 0}
.sensor-val{font-size:48px;font-weight:300;font-family:var(--mono);color:var(--accent-h)}
.sensor-unit{font-size:16px;color:var(--muted);margin-left:4px}
.sensor-label{font-size:12px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.07em}

/* ── Forms ───────────────────────────────────────────── */
.page-title{font-size:16px;font-weight:400;color:var(--text);margin-bottom:18px}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500}
input[type=text],input[type=number],input[type=password],select,textarea{
  width:100%;padding:7px 10px;
  background:#07131f;color:var(--text);
  border:1px solid var(--border);border-radius:var(--r);
  font-size:13px;font-family:inherit;outline:none;
  transition:border-color .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.form-field{display:flex;flex-direction:column}

/* ── Buttons ─────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;transition:background .15s,color .15s;font-family:inherit}
.btn-primary{background:var(--accent-dark);color:#e8f4ff;border:1px solid rgba(91,163,217,0.3)} .btn-primary:hover{background:#1976d2}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)} .btn-ghost:hover{color:var(--text);border-color:rgba(91,163,217,0.3)}
.btn-danger{background:var(--red-bg);color:#e88080;border:1px solid rgba(217,80,64,0.25)} .btn-danger:hover{background:rgba(217,80,64,0.25)}
.btn-sm{padding:4px 10px;font-size:11px}

/* ── Badges ──────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--r);font-size:11px;font-weight:600;letter-spacing:.04em}
.badge-ok{background:var(--green-bg);color:#6de090} .badge-warn{background:var(--yellow-bg);color:#f0c040} .badge-err{background:var(--red-bg);color:#e88080}

/* ── Log ─────────────────────────────────────────────── */
.log-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
#log-output{background:#070f1a;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;font-family:var(--mono);font-size:12px;line-height:1.7;height:520px;overflow-y:auto}
.log-info{color:#5a9fd4} .log-warn{color:#e6a817} .log-error{color:#d95040} .log-data{color:#5bb89a}

/* ── File table ──────────────────────────────────────── */
.file-table{width:100%;border-collapse:collapse;font-size:13px}
.file-table th{color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;padding:7px 10px;border-bottom:1px solid var(--border);text-align:left}
.file-table td{padding:7px 10px;border-bottom:1px solid rgba(90,140,200,0.07);color:var(--text)}
.file-table tr:hover td{background:rgba(91,163,217,0.04)}

/* ── Accordion ───────────────────────────────────────── */
.acc-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 16px;background:var(--hdr);border-bottom:1px solid var(--border)}
.acc-hdr:hover{background:rgba(91,163,217,0.15)}
.acc-hdr h2{font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.07em}
.acc-arrow{color:var(--muted);transition:transform .2s;font-size:10px}
.acc-arrow.open{transform:rotate(90deg)}
.acc-body{padding:16px;display:none} .acc-body.open{display:block}

/* ── Toast ───────────────────────────────────────────── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .25s,opacity .25s;opacity:0;z-index:9999}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.ok{background:var(--green-bg);color:#6de090;border:1px solid rgba(67,168,104,.4)}
#toast.warn{background:var(--yellow-bg);color:#f0c040;border:1px solid rgba(230,168,23,.4)}
#toast.err{background:var(--red-bg);color:#e88080;border:1px solid rgba(217,80,64,.4)}
</style>
</head>
<body>
<aside class="sidebar">
<div class="sidebar-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><polygon points="12,2 15.5,8.5 22,9.5 17,14.5 18.5,21 12,17.5 5.5,21 7,14.5 2,9.5 8.5,8.5" stroke="#5ba3d9" stroke-width="1.5" fill="rgba(91,163,217,0.12)"/></svg></div>
<a href="/" class="active" title="Dashboard"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-label="Dashboard"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg></a><a href="/config" title="Config"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-label="Config"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></a><a href="/logs" title="Logs"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-label="Logs"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2M9 12h6M9 16h4"/></svg></a><a href="/files" title="Files"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-label="Files"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg></a>
<div class="sidebar-spacer"></div>
<span style="font-size:10px;color:var(--faint);writing-mode:vertical-rl;padding-bottom:8px;letter-spacing:.1em">v2</span>
</aside>
<div class="wrap">
<div class="topbar">
<span class="topbar-title">MonSet — Dashboard</span>

<span class="topbar-badge" id="nav-ip">—</span>
</div>
<main>
<main>
  <h1 class="page-title">Dashboard</h1>
  <div class="kpi-grid" id="kpi-grid">
    <div class="kpi"><div class="kpi-label">Uptime</div><div class="kpi-value" id="kpi-uptime">—</div><div class="kpi-unit">hh:mm:ss</div></div>
    <div class="kpi"><div class="kpi-label">SD Card</div><div class="kpi-value" id="kpi-sd">—</div><div class="kpi-unit" id="kpi-sd-size">—</div></div>
    <div class="kpi"><div class="kpi-label">Free Heap</div><div class="kpi-value" id="kpi-heap">—</div><div class="kpi-unit">bytes</div></div>
    <div class="kpi"><div class="kpi-label">IP Address</div><div class="kpi-value" id="kpi-ip" style="font-size:16px">—</div><div class="kpi-unit" id="kpi-net-mode">—</div></div>
    <div class="kpi"><div class="kpi-label">RSSI</div><div class="kpi-value" id="kpi-rssi">—</div><div class="kpi-unit">dBm</div></div>
    <div class="kpi"><div class="kpi-label">Last Save</div><div class="kpi-value" id="kpi-save" style="font-size:14px">—</div><div class="kpi-unit" id="kpi-save-status">—</div></div>
  </div>
  <div class="two-col">
    <div class="card">
      <div class="card-title">Сеть</div>
      <div class="stat-row"><span class="stat-key">SSID</span><span class="stat-val" id="s-ssid">—</span></div>
      <div class="stat-row"><span class="stat-key">MAC</span><span class="stat-val" id="s-mac">—</span></div>
      <div class="stat-row"><span class="stat-key">Gateway</span><span class="stat-val" id="s-gw">—</span></div>
      <div class="stat-row"><span class="stat-key">DNS</span><span class="stat-val" id="s-dns">—</span></div>
      <div class="stat-row"><span class="stat-key">Соединений</span><span class="stat-val" id="s-conn">—</span></div>
      <div class="stat-row"><span class="stat-key">Rx / Tx</span><span class="stat-val" id="s-rxtx">—</span></div>
    </div>
    <div class="card">
      <div class="card-title">Система</div>
      <div class="stat-row"><span class="stat-key">CPU</span><span class="stat-val" id="s-cpu">—</span></div>
      <div class="stat-row"><span class="stat-key">Температура</span><span class="stat-val" id="s-temp">—</span></div>
      <div class="stat-row"><span class="stat-key">SD путь конфига</span><span class="stat-val" id="s-cfgpath">—</span></div>
      <div class="stat-row"><span class="stat-key">SD записей</span><span class="stat-val" id="s-sdwrites">—</span></div>
      <div class="stat-row"><span class="stat-key">Прошивка</span><span class="stat-val" id="s-fw">—</span></div>
      <div class="stat-row"><span class="stat-key">Дата сборки</span><span class="stat-val" id="s-built">—</span></div>
    </div>
  </div>
  <div class="card" style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="card-title" style="margin-bottom:0">Последние события</div>
      <a href="/logs" style="font-size:12px;color:var(--accent)">все логи →</a>
    </div>
    <div id="mini-log"></div>
  </div>
</main>
</main>
</div>
<div id="toast"></div>
<script>

function toast(msg,type,ms){
  type=type||'ok'; ms=ms||6000;
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='show '+type;
  clearTimeout(t._tid);
  t._tid=setTimeout(function(){t.className=type;},ms);
}

function colorKpi(id,val,okMin,warnMin){
  var el=document.getElementById(id);
  if(!el) return;
  var cls='err';
  if(val>=okMin) cls='ok';
  else if(val>=warnMin) cls='warn';
  el.className='kpi-value '+cls;
}
function fmt(s){
  if(s===undefined||s===null||s==='') return '—';
  return String(s);
}
function fmtUptime(s){
  s=parseInt(s)||0;
  var h=Math.floor(s/3600), m=Math.floor(s%3600/60), sec=s%60;
  return (h?String(h).padStart(2,'0')+':':'')+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}
function colorLog(line){
  if(/\[ERR/i.test(line)||/ERROR/i.test(line)) return '<span class="log-error">'+line+'</span>';
  if(/\[WRN/i.test(line)||/WARN/i.test(line))  return '<span class="log-warn">'+line+'</span>';
  if(/\[DATA/i.test(line))  return '<span class="log-data">'+line+'</span>';
  if(/\[DBG/i.test(line))   return '<span class="log-debug">'+line+'</span>';
  return '<span class="log-info">'+line+'</span>';
}
function poll(){
  fetch('/api/status').then(r=>r.json()).then(function(d){
    document.getElementById('kpi-uptime').textContent=fmtUptime(d.uptime_s);
    var sdOk=d.sd_ok||d.sd_status==='ok';
    var sdEl=document.getElementById('kpi-sd');
    sdEl.textContent=sdOk?'OK':'FAIL';
    sdEl.className='kpi-value '+(sdOk?'ok':'err');
    document.getElementById('kpi-sd-size').textContent=d.sd_free?d.sd_free+' free':'—';
    var heap=parseInt(d.free_heap)||0;
    document.getElementById('kpi-heap').textContent=heap?heap.toLocaleString():'—';
    colorKpi('kpi-heap',heap,40000,15000);
    var ip=d.ip||d.ip_address||'—';
    document.getElementById('kpi-ip').textContent=ip;
    document.getElementById('kpi-net-mode').textContent=d.net_mode||d.mode||'—';
    document.getElementById('nav-ip').textContent=ip;
    var rssi=parseInt(d.rssi)||0;
    document.getElementById('kpi-rssi').textContent=rssi?rssi:'—';
    colorKpi('kpi-rssi',rssi,-60,-80);
    document.getElementById('kpi-save').textContent=d.last_save_time||'—';
    document.getElementById('kpi-save-status').textContent=d.last_save_ok?'на SD':'в RAM';
    document.getElementById('s-ssid').textContent=fmt(d.ssid);
    document.getElementById('s-mac').textContent=fmt(d.mac);
    document.getElementById('s-gw').textContent=fmt(d.gateway);
    document.getElementById('s-dns').textContent=fmt(d.dns);
    document.getElementById('s-conn').textContent=fmt(d.connections);
    document.getElementById('s-rxtx').textContent=(d.rx_bytes||'?')+' / '+(d.tx_bytes||'?');
    document.getElementById('s-cpu').textContent=d.cpu_load!==undefined?d.cpu_load+'%':'—';
    document.getElementById('s-temp').textContent=d.temp_c!==undefined?d.temp_c+' °C':'—';
    document.getElementById('s-cfgpath').textContent=fmt(d.config_path);
    document.getElementById('s-sdwrites').textContent=fmt(d.sd_writes);
    document.getElementById('s-fw').textContent=fmt(d.firmware);
    document.getElementById('s-built').textContent=fmt(d.build_date);
    var log=document.getElementById('mini-log');
    if(d.last_lines&&Array.isArray(d.last_lines)){
      log.innerHTML=d.last_lines.slice(-6).map(colorLog).join('\n');
      log.scrollTop=log.scrollHeight;
    }
  }).catch(function(){toast('Нет связи с устройством','err');});
}
poll(); setInterval(poll,5000);
</script>
</body>
</html>
