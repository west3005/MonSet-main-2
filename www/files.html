ity:.85}.btn.s{background:#30363d;color:#c9d1d9}.cd{background:#0e1117;border:1px solid #30363d;border-radius:6px;padding:10px;margin-bottom:8px}.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.tabs{display:flex;gap:4px;margin-bottom:10px}.tab{padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px;background:#0e1117;border:1px solid #30363d;color:#c9d1d9}.tab.act{background:#2dd4bf;color:#0e1117;border-color:#2dd4bf;font-weight:600}.tp{display:none}.tp.act{display:block}.bar{position:fixed;bottom:8px;left:60px;right:8px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px 16px;display:flex;gap:8px;z-index:99;box-shadow:0 -2px 16px rgba(0,0,0,.4)}.dr{display:flex;align-items:center;gap:6px;background:#0e1117;border:1px solid #30363d;border-radius:5px;padding:5px 8px;margin-bottom:5px}.dr span{flex:1;font-size:12px}.dr button{background:none;border:none;color:#8b949e;cursor:pointer;font-size:14px;padding:0 2px}.dr button:hover{color:#2dd4bf}table{width:100%;border-collapse:collapse;font-size:12px}th{background:#0e1117;color:#8b949e;padding:5px 6px;text-align:left;border-bottom:1px solid #30363d}td{padding:4px 5px;border-bottom:1px solid #1c2128}td input,td select{padding:3px 5px;font-size:12px}.msg{display:none;padding:6px 12px;border-radius:5px;font-size:13px;font-weight:600}.ok{background:#1a3a2e;color:#2dd4bf}.er{background:#3a1a1a;color:#f87171}.warn{background:#2a2200;color:#e3b341}.sh{font-size:12px;color:#8b949e;margin:8px 0 4px;font-weight:600}

/* ── layout shell (sidebar + wrap) ─────────────────── */
body{padding:0;display:flex;flex-direction:row;min-height:100dvh}

.sidebar{
  width:52px;min-width:52px;
  background:#161b22;
  border-right:1px solid #30363d;
  display:flex;flex-direction:column;align-items:center;
  padding:10px 0;gap:2px;
  position:sticky;top:0;height:100dvh;
  flex-shrink:0;
}
.sidebar-logo{
  width:32px;height:32px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:center;
  color:#2dd4bf;
}
.sidebar a{
  width:38px;height:38px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:#8b949e;text-decoration:none;
  transition:color .15s,background .15s;
  position:relative;
}
.sidebar a:hover{color:#c9d1d9;background:#21262d}
.sidebar a.act{
  color:#0e1117;background:#2dd4bf;
}
.sidebar a.act::after{
  content:attr(title);
  position:absolute;left:48px;
  background:#161b22;color:#2dd4bf;
  font-size:11px;font-weight:600;
  padding:3px 8px;border-radius:4px;
  border:1px solid #30363d;
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .15s;
  z-index:100;
}
.sidebar a:hover::after{
  content:attr(title);
  position:absolute;left:48px;
  background:#161b22;color:#c9d1d9;
  font-size:11px;padding:3px 8px;border-radius:4px;
  border:1px solid #30363d;
  white-space:nowrap;pointer-events:none;
  opacity:1;z-index:100;
}
.sidebar-spacer{flex:1}
.sidebar-ver{
  font-size:10px;color:#484f58;
  writing-mode:vertical-rl;
  padding-bottom:6px;letter-spacing:.1em;
}

.wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* topbar — тонкая полоска с IP */
.topbar{
  background:#161b22;border-bottom:1px solid #30363d;
  height:40px;display:flex;align-items:center;
  padding:0 16px;gap:12px;flex-shrink:0;
}
.topbar-title{font-size:13px;font-weight:600;color:#2dd4bf;flex:1}
.topbar-ip{font-size:12px;color:#8b949e;font-family:monospace}

/* wrap > main */
.wrap main, .wrap > div:not(.topbar){padding:0}

/* ── доп. классы из index.html ──────────────────────── */
:root{--teal:#2dd4bf;--bg:#0e1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e}
.page-title{font-size:18px;font-weight:700;color:#2dd4bf;padding:14px 16px 0;margin-bottom:14px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin:10px}
.card+.card{margin-top:0}
.card-title{font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1c2128}
.stat-row:last-child{border-bottom:none}
.stat-key{font-size:12px;color:#8b949e}
.stat-val{font-size:12px;color:#c9d1d9;font-family:monospace;text-align:right}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin:10px}
.kpi{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px 16px}
.kpi-label{font-size:11px;color:#8b949e;font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:700;font-family:monospace;color:#c9d1d9}
.kpi-value.ok{color:#2dd4bf}.kpi-value.warn{color:#e3b341}.kpi-value.err{color:#f87171}
.kpi-unit{font-size:12px;color:#8b949e;margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.badge-ok{background:#1a3a2e;color:#2dd4bf}
.badge-warn{background:#2a2200;color:#e3b341}
.badge-err{background:#3a1a1a;color:#f87171}
.btn-primary{background:#2dd4bf;color:#0e1117;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px}
.btn-ghost:hover{border-color:#2dd4bf;color:#2dd4bf}
.btn-danger{background:#3a1a1a;color:#f87171;border:1px solid #5a2020;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px}
.btn-sm{padding:4px 10px;font-size:12px}
#log-output{background:#0e1117;border:1px solid #30363d;border-radius:6px;padding:12px 14px;font-family:monospace;font-size:12px;line-height:1.7;height:520px;overflow-y:auto;margin:10px}
.log-info{color:#79c0ff}.log-warn{color:#e3b341}.log-error{color:#f87171}.log-data{color:#2dd4bf}.log-debug{color:#8b949e}
.log-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:10px}
.file-table{width:100%;border-collapse:collapse;font-size:13px}
.file-table th{background:#0e1117;color:#8b949e;padding:6px 10px;text-align:left;border-bottom:1px solid #30363d;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.file-table td{padding:6px 10px;border-bottom:1px solid #1c2128;color:#c9d1d9}
.file-table tr:hover td{background:#161b22}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 20px;border-radius:6px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .25s,opacity .25s;opacity:0;z-index:9999}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.ok{background:#1a3a2e;color:#2dd4bf;border:1px solid #2dd4bf44}
#toast.warn{background:#2a2200;color:#e3b341;border:1px solid #e3b34144}
#toast.err{background:#3a1a1a;color:#f87171;border:1px solid #f8717144}
@media(max-width:600px){.two-col,.kpi-grid{grid-template-columns:1fr}.sidebar{width:44px;min-width:44px}}


/* Files-specific */
.file-table{width:100%;border-collapse:collapse;font-size:13px}
.file-table th{background:#0e1117;color:#8b949e;padding:7px 10px;text-align:left;
  border-bottom:1px solid #30363d;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.07em}
.file-table td{padding:6px 10px;border-bottom:1px solid #1c2128;color:#c9d1d9}
.file-table tr:hover td{background:#1c2128}
.file-name{cursor:pointer;color:#2dd4bf;font-family:monospace;font-size:12px}
.file-name:hover{text-decoration:underline}

.btn-danger{background:#3a1a1a;color:#f87171;border:1px solid #5a2a2a;
  border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer}
.btn-danger:hover{background:#5a2020}
.breadcrumb{display:flex;align-items:center;gap:4px;flex-wrap:wrap;font-size:13px}

.drop-zone{border:2px dashed #30363d;border-radius:8px;padding:18px 14px;

.drop-zone.drag-over{border-color:#2dd4bf;color:#2dd4bf}
.progress-bar{display:none;height:4px;background:#30363d;border-radius:2px;

.path-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;

  padding:6px 10px;font-family:monospace;font-size:12px}
</style>

<script>
var cwd = '0:/';

function toast(msg, type, ms) {
  type = type || 'ok'; ms = ms || 4000;
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  clearTimeout(t._tid);
  t._tid = setTimeout(function() { t.className = type; }, ms);
}

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtSize(n) {
  n = parseInt(n) || 0;
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1048576).toFixed(2) + ' MB';
}

function buildBreadcrumb(path) {
  var el = document.getElementById('breadcrumb');
  var p  = path.replace(/^0:\//, '').replace(/\/+$/, '');
  var parts = p ? p.split('/') : [];
  var html = '<a href="#" onclick="cd(\'0:/\');return false">0:/</a>';
  var acc  = '0:/';
  parts.forEach(function(part) {
    acc += part + '/';
    var a = acc;
    html += '<span>▸</span><a href="#" onclick="cd(\'' + a + '\');return false">' + escH(part) + '</a>';
  });
  el.innerHTML = html;
}

function parentOf(p) {
  var s = p.replace(/\/+$/, '');
  var i = s.lastIndexOf('/');
  if (i <= 0) return '0:/';
  var par = s.slice(0, i + 1);
  if (!par.match(/^0:\/./)) return '0:/';
  return par;
}

function cd(path) {
  cwd = path;
  loadDir(path);
}

function loadDir(path) {
  buildBreadcrumb(path);
  var tb = document.getElementById('file-list');
  tb.innerHTML = '<tr><td colspan="3" style="color:#8b949e;padding:20px;text-align:center">Загрузка…</td></tr>';
  fetch('/api/files?path=' + encodeURIComponent(path))
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) { toast('Ошибка: ' + d.error, 'err'); return; }
      var items = d.items || [];
      var html  = '';
      if (path !== '0:/') {
        var par = parentOf(path);
        html += '<tr class="dir-row"><td class="file-name" colspan="2" onclick="cd(\'' + par + '\')">'
              + '&#128281; ..</td><td></td></tr>';
      }
      items.sort(function(a,b) {
        return (b.dir ? 1 : 0) - (a.dir ? 1 : 0) || a.name.localeCompare(b.name);
      });
      items.forEach(function(f) {
        var fp = path.replace(/\/+$/, '') + '/' + f.name;
        if (f.dir) {
          html += '<tr class="dir-row">'
                + '<td class="file-name" colspan="2" onclick="cd(\'' + fp + '/\')">'
                + '&#128193; ' + escH(f.name) + '</td>'
                + '<td></td></tr>';
        } else {
          html += '<tr>'
                + '<td class="file-name" onclick="dlFile(\'' + fp + '\')">'
                + '&#128196; ' + escH(f.name) + '</td>'
                + '<td class="file-size">' + fmtSize(f.size) + '</td>'
                + '<td style="text-align:right">'
                + '<button class="btn s" style="padding:2px 8px;font-size:11px;margin-right:4px" '
                + 'onclick="dlFile(\'' + fp + '\')">&#11015; Скачать</button>'
                + '<button class="btn-danger" onclick="askDel(\'' + fp + '\',this)">✕ Удалить</button>'
                + '</td></tr>';
        }
      });
      if (!items.length) {
        html = '<tr><td colspan="3" style="color:#8b949e;padding:20px;text-align:center">Папка пуста</td></tr>';
      }
      tb.innerHTML = html;
    })
    .catch(function() { toast('Ошибка загрузки списка', 'err'); });
}

function dlFile(fp) {
  window.location.href = '/api/download?path=' + encodeURIComponent(fp);
}

var _delPath = '', _delBtn = null;
function askDel(fp, btn) {
  _delPath = fp; _delBtn = btn;
  document.getElementById('confirm-msg').textContent = 'Удалить ' + fp + '?';
  var m = document.getElementById('confirm-modal');
  m.style.display = 'flex';
  document.getElementById('confirm-ok').onclick = function() { closeConfirm(); doDelete(); };
}
function closeConfirm() {
  document.getElementById('confirm-modal').style.display = 'none';
}
function doDelete() {
  if (_delBtn) { _delBtn.disabled = true; _delBtn.textContent = '…'; }
  fetch('/api/delete?path=' + encodeURIComponent(_delPath), { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok || d.status === 'ok') {
        toast('Удалено: ' + _delPath, 'ok');
        loadDir(cwd);
      } else {
        toast('Ошибка: ' + (d.error || d.message || '?'), 'err');
        if (_delBtn) { _delBtn.disabled = false; _delBtn.textContent = '✕ Удалить'; }
      }
    })
    .catch(function() {
      toast('Нет связи', 'err');
      if (_delBtn) { _delBtn.disabled = false; _delBtn.textContent = '✕ Удалить'; }
    });
}

/* Upload */
function upload(files) {
  if (!files || !files.length) return;
  var pb = document.getElementById('prog-bar');
  var pf = document.getElementById('prog-fill');
  var st = document.getElementById('upload-status');
  pb.style.display = 'block'; pf.style.width = '0%';
  var i = 0;
  function next() {
    if (i >= files.length) {
      pb.style.display = 'none'; st.textContent = '';
      loadDir(cwd);
      toast('Загружено: ' + files.length + ' файл(а)', 'ok');
      return;
    }
    var f = files[i++];
    st.textContent = 'Загрузка: ' + f.name;
    var fd  = new FormData();
    fd.append('file', f);
    var xhr = new XMLHttpRequest();
    xhr.upload.onprogress = function(e) {
      if (e.lengthComputable) pf.style.width = Math.round(e.loaded / e.total * 100) + '%';
    };
    xhr.onload = function() { pf.style.width = '0%'; next(); };
    xhr.onerror = function() { toast('Ошибка загрузки ' + f.name, 'err'); };
    var dest = cwd.replace(/\/+$/, '') + '/' + f.name;
    xhr.open('POST', '/api/upload?path=' + encodeURIComponent(dest));
    xhr.send(fd);
  }
  next();
}

var dz = document.getElementById('drop-zone');
dz.addEventListener('dragover',  function(e) { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', function()  { dz.classList.remove('drag-over'); });
dz.addEventListener('drop',      function(e) { e.preventDefault(); dz.classList.remove('drag-over'); upload(e.dataTransfer.files); });
document.getElementById('file-input').addEventListener('change', function(e) { upload(e.target.files); });

  if(el && d.ip) el.textContent=d.ip;
}).catch(function(){});

loadDir('0:/');
