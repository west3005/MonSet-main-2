<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MonSet — Files</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1626;
  --sidebar:#060e1c;
  --surface:#0f1e33;
  --surface2:#162540;
  --hdr:#1a3a5c;
  --border:rgba(90,140,200,0.13);
  --text:#ddeeff;
  --muted:#7a9cc0;
  --faint:#2a4060;
  --accent:#5ba3d9;
  --accent-h:#7bc0f0;
  --accent-dark:#1565c0;
  --green:#43a868; --yellow:#e6a817; --red:#d95040;
  --green-bg:rgba(67,168,104,0.15); --yellow-bg:rgba(230,168,23,0.15); --red-bg:rgba(217,80,64,0.15);
  --mono:'IBM Plex Mono','Courier New',monospace;
  --r:4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans','Roboto','Helvetica Neue',sans-serif;min-height:100dvh;display:flex;flex-direction:row}

/* ── Sidebar ─────────────────────────────────────────── */
.sidebar{
  width:56px;min-width:56px;background:var(--sidebar);
  display:flex;flex-direction:column;align-items:center;
  padding:12px 0;gap:4px;border-right:1px solid var(--border);
  position:sticky;top:0;height:100dvh;
}
.sidebar-logo{
  width:34px;height:34px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);
}
.sidebar a{
  width:40px;height:40px;border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);text-decoration:none;
  transition:color .15s,background .15s;
  position:relative;
}
.sidebar a:hover{color:var(--accent-h);background:rgba(91,163,217,0.1)}
.sidebar a.active{color:var(--accent);background:rgba(91,163,217,0.15)}
.sidebar a.active::before{
  content:'';position:absolute;left:0;top:8px;bottom:8px;
  width:3px;background:var(--accent);border-radius:0 2px 2px 0;
}
.sidebar-spacer{flex:1}

/* ── Wrap (topbar + main) ─────────────────────────────── */
.wrap{flex:1;display:flex;flex-direction:column;min-width:0}

/* ── Topbar ──────────────────────────────────────────── */
.topbar{
  height:48px;background:var(--sidebar);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;
}
.topbar-title{font-size:14px;font-weight:500;color:var(--text);flex:1}
.topbar-badge{
  font-size:11px;font-weight:600;padding:2px 8px;
  border-radius:var(--r);background:var(--hdr);color:var(--accent);
  border:1px solid rgba(91,163,217,0.25);letter-spacing:.04em;
}

/* ── Main content ────────────────────────────────────── */
main{flex:1;padding:20px 24px;overflow:auto}

/* ── Cards ───────────────────────────────────────────── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  margin-bottom:14px;
  overflow:hidden;
}
.card-hdr{
  background:var(--hdr);
  padding:8px 16px;
  font-size:12px;font-weight:600;color:var(--accent);
  text-transform:uppercase;letter-spacing:.09em;
  border-bottom:1px solid var(--border);
}
.card-body{padding:16px}
.card-title{
  font-size:11px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.09em;margin-bottom:14px;
}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── KPI grid ────────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.kpi{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 16px;
}
.kpi-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:300;font-family:var(--mono);color:var(--accent-h);letter-spacing:-.01em}
.kpi-value.ok{color:#5dd68a} .kpi-value.warn{color:#f0b429} .kpi-value.err{color:#e06060}
.kpi-unit{font-size:11px;color:var(--muted);margin-top:3px}

/* ── Stat rows ───────────────────────────────────────── */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-key{font-size:12px;color:var(--muted)}
.stat-val{font-size:12px;color:var(--text);font-family:var(--mono);text-align:right}

/* ── Sensor block ────────────────────────────────────── */
.sensor-big{text-align:center;padding:20px 0}
.sensor-val{font-size:48px;font-weight:300;font-family:var(--mono);color:var(--accent-h)}
.sensor-unit{font-size:16px;color:var(--muted);margin-left:4px}
.sensor-label{font-size:12px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.07em}

/* ── Forms ───────────────────────────────────────────── */
.page-title{font-size:16px;font-weight:400;color:var(--text);margin-bottom:18px}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500}
input[type=text],input[type=number],input[type=password],select,textarea{
  width:100%;padding:7px 10px;
  background:#07131f;color:var(--text);
  border:1px solid var(--border);border-radius:var(--r);
  font-size:13px;font-family:inherit;outline:none;
  transition:border-color .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.form-field{display:flex;flex-direction:column}

/* ── Buttons ─────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;transition:background .15s,color .15s;font-family:inherit}
.btn-primary{background:var(--accent-dark);color:#e8f4ff;border:1px solid rgba(91,163,217,0.3)} .btn-primary:hover{background:#1976d2}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)} .btn-ghost:hover{color:var(--text);border-color:rgba(91,163,217,0.3)}
.btn-danger{background:var(--red-bg);color:#e88080;border:1px solid rgba(217,80,64,0.25)} .btn-danger:hover{background:rgba(217,80,64,0.25)}
.btn-sm{padding:4px 10px;font-size:11px}

/* ── Badges ──────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--r);font-size:11px;font-weight:600;letter-spacing:.04em}
.badge-ok{background:var(--green-bg);color:#6de090} .badge-warn{background:var(--yellow-bg);color:#f0c040} .badge-err{background:var(--red-bg);color:#e88080}

/* ── Log ─────────────────────────────────────────────── */
.log-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
#log-output{background:#070f1a;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;font-family:var(--mono);font-size:12px;line-height:1.7;height:520px;overflow-y:auto}
.log-info{color:#5a9fd4} .log-warn{color:#e6a817} .log-error{color:#d95040} .log-data{color:#5bb89a}

/* ── File table ──────────────────────────────────────── */
.file-table{width:100%;border-collapse:collapse;font-size:13px}
.file-table th{color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;padding:7px 10px;border-bottom:1px solid var(--border);text-align:left}
.file-table td{padding:7px 10px;border-bottom:1px solid rgba(90,140,200,0.07);color:var(--text)}
.file-table tr:hover td{background:rgba(91,163,217,0.04)}

/* ── Accordion ───────────────────────────────────────── */
.acc-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 16px;background:var(--hdr);border-bottom:1px solid var(--border)}
.acc-hdr:hover{background:rgba(91,163,217,0.15)}
.acc-hdr h2{font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.07em}
.acc-arrow{color:var(--muted);transition:transform .2s;font-size:10px}
.acc-arrow.open{transform:rotate(90deg)}
.acc-body{padding:16px;display:none} .acc-body.open{display:block}

/* ── Toast ───────────────────────────────────────────── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .25s,opacity .25s;opacity:0;z-index:9999}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.ok{background:var(--green-bg);color:#6de090;border:1px solid rgba(67,168,104,.4)}
#toast.warn{background:var(--yellow-bg);color:#f0c040;border:1px solid rgba(230,168,23,.4)}
#toast.err{background:var(--red-bg);color:#e88080;border:1px solid rgba(217,80,64,.4)}
</style>
</head>
<body>
<aside class="sidebar">
<div class="sidebar-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><polygon points="12,2 15.5,8.5 22,9.5 17,14.5 18.5,21 12,17.5 5.5,21 7,14.5 2,9.5 8.5,8.5" stroke="#5ba3d9" stroke-width="1.5" fill="rgba(91,163,217,0.12)"/></svg></div>
<a href="/" title="Dashboard"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-label="Dashboard"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg></a><a href="/config" title="Config"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-label="Config"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></a><a href="/logs" title="Logs"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-label="Logs"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2M9 12h6M9 16h4"/></svg></a><a href="/files" class="active" title="Files"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-label="Files"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg></a>
<div class="sidebar-spacer"></div>
<span style="font-size:10px;color:var(--faint);writing-mode:vertical-rl;padding-bottom:8px;letter-spacing:.1em">v2</span>
</aside>
<div class="wrap">
<div class="topbar">
<span class="topbar-title">MonSet — Files</span>

<span class="topbar-badge" id="nav-ip">—</span>
</div>
<main>
<main>
  <h1 class="page-title">Files</h1>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="breadcrumb" id="breadcrumb"></div>
      <span style="font-size:11px;color:var(--faint);font-family:var(--mono)" id="sd-free-lbl"></span>
    </div>
    <div class="drop-zone" id="drop-zone">
      Перетащите файлы сюда или <label style="color:var(--accent);cursor:pointer">выберите<input type="file" id="file-input" multiple style="display:none"></label>
      <div class="progress-bar" id="prog-bar"><div class="progress-fill" id="prog-fill"></div></div>
      <div id="upload-status" style="font-size:12px;color:var(--muted);margin-top:6px"></div>
    </div>
    <div style="margin-top:16px">
      <table class="file-table">
        <thead><tr><th>Имя</th><th>Размер</th><th>Изменён</th><th></th></tr></thead>
        <tbody id="file-list"><tr><td colspan="4" style="color:var(--muted);padding:20px;text-align:center">Загрузка…</td></tr></tbody>
      </table>
    </div>
  </div>
</main>
<div id="toast"></div>
</main>
</div>
<div id="toast"></div>
<script>

function toast(msg,type,ms){
  type=type||'ok'; ms=ms||6000;
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='show '+type;
  clearTimeout(t._tid);
  t._tid=setTimeout(function(){t.className=type;},ms);
}

var cwd='/';
function encPath(p){return encodeURIComponent(p).replace(/%2F/g,'/');}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtSize(n){
  n=parseInt(n)||0;
  if(n<1024) return n+' B';
  if(n<1048576) return (n/1024).toFixed(1)+' KB';
  return (n/1048576).toFixed(2)+' MB';
}
function buildBreadcrumb(path){
  var el=document.getElementById('breadcrumb');
  var parts=path.split('/').filter(Boolean);
  var html='<a href="#" onclick="cd(\'/\');return false">0:</a>';
  var acc='/';
  parts.forEach(function(p){
    acc+=(acc==='/'?'':'/') +p;
    var a=acc;
    html+='<span>▸</span><a href="#" onclick="cd(''+a+'');return false">'+escH(p)+'</a>';
  });
  el.innerHTML=html;
}
function cd(path){
  cwd=path; loadDir(path);
}
function loadDir(path){
  buildBreadcrumb(path);
  fetch('/api/files?path='+encodeURIComponent(path)).then(r=>r.json()).then(function(d){
    if(d.free_bytes!==undefined) document.getElementById('sd-free-lbl').textContent='Свободно: '+fmtSize(d.free_bytes);
    var items=d.files||d.items||[];
    var tb=document.getElementById('file-list');
    if(!items.length){
      tb.innerHTML='<tr><td colspan="4" style="color:var(--muted);padding:20px;text-align:center">Папка пуста</td></tr>';
      return;
    }
    var html='';
    if(path!=='/'){
      html+='<tr><td class="file-name dir-icon" colspan="3" onclick="cd(parent_of(''+path+''))">&#128281; ..</td><td></td></tr>';
    }
    items.sort(function(a,b){return (b.dir?1:0)-(a.dir?1:0)||a.name.localeCompare(b.name);});
    items.forEach(function(f){
      var fp=(path==='/'?'/':path+'/')+f.name;
      if(f.dir){
        html+='<tr><td class="file-name dir-icon" colspan="2" onclick="cd(''+fp+'')">&#128193; '+escH(f.name)+'</td><td style="color:var(--muted)">папка</td><td></td></tr>';
      } else {
        html+='<tr>'
          +'<td class="file-name" onclick="dl(''+fp+'')">&#128196; '+escH(f.name)+'</td>'
          +'<td class="file-size">'+fmtSize(f.size)+'</td>'
          +'<td class="file-size">'+(f.date||'—')+'</td>'
          +'<td><button class="btn btn-danger btn-sm" onclick="del(''+fp+'',this)">✕</button></td>'
          +'</tr>';
      }
    });
    tb.innerHTML=html;
  }).catch(function(){toast('Ошибка загрузки списка','err');});
}
function parent_of(p){
  var s=p.replace(/\/+$/,'');
  var i=s.lastIndexOf('/');
  return i<=0?'/':s.slice(0,i);
}
function dl(fp){
  window.open('/api/file?path='+encodeURIComponent(fp),'_blank');
}
function del(fp,btn){
  if(!confirm('Удалить '+fp+'?')) return;
  btn.disabled=true; btn.textContent='…';
  fetch('/api/files?path='+encodeURIComponent(fp),{method:'DELETE'})
  .then(r=>r.json()).then(function(d){
    if(d.status==='ok'){ toast('Удалено: '+fp,'ok'); loadDir(cwd); }
    else toast('Ошибка: '+(d.message||'?'),'err');
  }).catch(function(){toast('Нет связи','err');});
}
function upload(files){
  if(!files||!files.length) return;
  var pb=document.getElementById('prog-bar');
  var pf=document.getElementById('prog-fill');
  var st=document.getElementById('upload-status');
  pb.style.display='block'; pf.style.width='0%';
  var i=0;
  function next(){
    if(i>=files.length){ pb.style.display='none'; st.textContent=''; loadDir(cwd); toast('Загружено: '+files.length+' файл(а)','ok'); return; }
    var f=files[i++]; st.textContent='Загрузка: '+f.name;
    var fd=new FormData(); fd.append('file',f); fd.append('path',cwd);
    var xhr=new XMLHttpRequest();
    xhr.upload.onprogress=function(e){if(e.lengthComputable) pf.style.width=Math.round(e.loaded/e.total*100)+'%';};
    xhr.onload=function(){pf.style.width='0%'; next();};
    xhr.onerror=function(){toast('Ошибка загрузки '+f.name,'err');};
    xhr.open('POST','/api/upload');
    xhr.send(fd);
  }
  next();
}
var dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag-over');});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag-over');upload(e.dataTransfer.files);});
document.getElementById('file-input').addEventListener('change',function(e){upload(e.target.files);});
loadDir('/');
</script>
</body>
</html>
